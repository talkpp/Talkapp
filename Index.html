<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkApp Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#f0f2f5}
.screen{display:none;height:100vh;flex-direction:column}
.active{display:flex}

#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#box{background:#fff;padding:20px;border-radius:10px;width:300px}

.header{background:#075E54;color:#fff;padding:15px;font-size:18px}
.user{padding:12px;border-bottom:1px solid #ddd;cursor:pointer}

#messages{flex:1;overflow:auto;padding:10px;background:#ece5dd}
.msg{padding:10px;border-radius:10px;margin:5px;max-width:60%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

.tick{font-size:10px;margin-left:5px}
.seen{color:blue}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="box">
    <h2>TalkApp</h2>
    <input id="email" placeholder="Email"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>
    <button onclick="emailLogin()">Login / Signup</button><br><br>
    <button onclick="googleLogin()">Google Login</button>
  </div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="header">
    TalkApp
    <span style="float:right;cursor:pointer" onclick="openSearch()">🔍</span>
  </div>
  <div id="chatList"></div>
</div>

<!-- SEARCH -->
<div id="searchScreen" class="screen">
  <div class="header">Search</div>
  <input id="searchInput" placeholder="Search user..." onkeyup="searchUser()">
  <div id="userList"></div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div class="header">
    <span onclick="back()">⬅</span>
    <span id="chatName"></span>
    <button onclick="toggleBlock()">Block</button>
  </div>

  <div id="status"></div>
  <div id="typing"></div>
  <div id="messages"></div>

  <div style="display:flex;padding:10px">
    <input id="msg" oninput="typingNow()" style="flex:1;padding:10px">
    <button onclick="send()">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCz0Bwl9Vz79DNOnFN4t9TaEKtKKUL5m8o",
  authDomain: "talkapp-70bee.firebaseapp.com",
  projectId: "talkapp-70bee"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let ME,currentUser,currentChat,unsubMessages=null;

// LOGIN
window.emailLogin = async()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,pass.value);
  }catch{
    let cred=await createUserWithEmailAndPassword(auth,email.value,pass.value);
    await setDoc(doc(db,"users",cred.user.uid),{
      name:email.value.split("@")[0],
      uid:cred.user.uid,
      blocked:[],
      lastSeen:Date.now()
    });
  }
};

// GOOGLE LOGIN
window.googleLogin = async()=>{
  let res=await signInWithPopup(auth,new GoogleAuthProvider());

  let d=await getDoc(doc(db,"users",res.user.uid));
  if(!d.exists()){
    await setDoc(doc(db,"users",res.user.uid),{
      name:res.user.displayName.toLowerCase().replace(/\s/g,''),
      uid:res.user.uid,
      blocked:[],
      lastSeen:Date.now()
    });
  }
};

// AUTH
onAuthStateChanged(auth, async user=>{
  if(user){
    ME=user;
    document.getElementById("login").style.display="none";
    show("homeScreen");
    loadChatList();

    setInterval(()=>{
      updateDoc(doc(db,"users",ME.uid),{lastSeen:Date.now()});
    },5000);
  }
});

// SCREEN
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// SEARCH
window.openSearch=()=>show("searchScreen");

window.searchUser = ()=>{
  let term=searchInput.value.toLowerCase();
  let box=userList;

  if(!term){box.innerHTML="";return;}

  onSnapshot(collection(db,"users"),snap=>{
    box.innerHTML="";
    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid)return;
      if(u.name.includes(term)){
        let div=document.createElement("div");
        div.className="user";
        div.innerText=u.name;
        div.onclick=()=>openChat(u);
        box.appendChild(div);
      }
    });
  });
};

// CHAT LIST
function loadChatList(){
  onSnapshot(collection(db,"chats"),async snap=>{
    let box=chatList;
    box.innerHTML="";

    for(let d of snap.docs){
      let id=d.id;
      if(!id.includes(ME.uid)) continue;

      let other=id.replace(ME.uid,"").replace("_","");
      let udoc=await getDoc(doc(db,"users",other));
      if(!udoc.exists()) continue;

      let u=udoc.data();

      let msgs=await getDocs(query(collection(db,"chats",id,"messages"),orderBy("time","desc")));
      let last="";

      msgs.forEach(m=>{
        if(!last){
          let data=m.data();
          last=data.deleted?"deleted":data.text;
        }
      });

      let div=document.createElement("div");
      div.className="user";
      div.innerHTML=`<b>${u.name}</b><br><small>${last}</small>`;
      div.onclick=()=>openChat(u);
      box.appendChild(div);
    }
  });
}

// OPEN CHAT
function openChat(u){
  currentUser=u;
  currentChat=[ME.uid,u.uid].sort().join("_");
  chatName.innerText=u.name;
  show("chatScreen");

  // last seen
  onSnapshot(doc(db,"users",u.uid),d=>{
    let diff=(Date.now()-d.data().lastSeen)/1000;
    status.innerText=diff<5?"online":"last seen "+Math.floor(diff)+"s";
  });

  // typing
  onSnapshot(doc(db,"typing",currentChat),d=>{
    typing.innerText=(d.exists() && d.data().uid!==ME.uid)?"typing...":"";
  });

  if(unsubMessages) unsubMessages();

  unsubMessages = onSnapshot(
    query(collection(db,"chats",currentChat,"messages"),orderBy("time")),
    snap=>{
      messages.innerHTML="";
      snap.forEach(docu=>{
        let m=docu.data();

        let div=document.createElement("div");
        div.className="msg "+(m.uid===ME.uid?"me":"other");

        div.innerHTML=(m.deleted?"<i>deleted</i>":m.text)
        +" "+(m.uid===ME.uid?(m.seen?"✔✔":"✔"):"");

        if(m.uid!==ME.uid && !m.seen){
          updateDoc(doc(db,"chats",currentChat,"messages",docu.id),{seen:true});
        }

        // delete
        div.oncontextmenu=e=>{
          e.preventDefault();
          if(m.uid===ME.uid){
            updateDoc(doc(db,"chats",currentChat,"messages",docu.id),{deleted:true});
          }
        };

        messages.appendChild(div);
      });
      messages.scrollTop=messages.scrollHeight;
    }
  );
}

// SEND
window.send = async()=>{
  if(!msg.value)return;

  await addDoc(collection(db,"chats",currentChat,"messages"),{
    text:msg.value,
    uid:ME.uid,
    seen:false,
    deleted:false,
    time:Date.now()
  });

  msg.value="";
};

// typing
window.typingNow=()=>{
  if(!currentChat)return;
  setDoc(doc(db,"typing",currentChat),{uid:ME.uid});
  setTimeout(()=>setDoc(doc(db,"typing",currentChat),{}),1000);
};

// block
window.toggleBlock = async()=>{
  let ref=doc(db,"users",ME.uid);
  let d=await getDoc(ref);
  let arr=d.data().blocked||[];

  if(arr.includes(currentUser.uid)){
    arr=arr.filter(x=>x!==currentUser.uid);
  }else{
    arr.push(currentUser.uid);
  }

  await updateDoc(ref,{blocked:arr});
  alert("Updated");
};

// back
window.back=()=>show("homeScreen");

</script>
</body>
  </html>
