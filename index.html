<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
    body{margin:0;font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#333;overflow:hidden;height:100vh;}
    
    #login{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);}
    #loginBox{background:#fff;padding:30px;border-radius:16px;width:320px;box-shadow:0 10px 30px rgba(0,0,0,0.2);text-align:center;}
    #login h2{margin:0 0 20px;color:#667eea;font-size:28px;}
    #login input{width:100%;padding:14px;margin:10px 0;border:1px solid #ddd;border-radius:8px;font-size:16px;box-sizing:border-box;}
    #login button{width:100%;padding:14px;background:#667eea;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:600;}
    #login button:hover{background:#5a6fd8;}
    #login .error{color:#d32f2f;font-size:14px;margin-top:10px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username (min 3 chars)">
    <input id="p" type="password" placeholder="Password (min 6 chars)">
    <button onclick="handleAuth()">Login / Sign Up</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<!-- Baaki pura APP code yahin paste kar do (previous version ka #app, #sidebar, #chatArea etc.) -->

<script>
// Firebase Config (same)
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME = null;

// Improved Login / Signup Function
async function handleAuth(){
  const username = document.getElementById("u").value.trim().toLowerCase();
  const password = document.getElementById("p").value;
  const errorDiv = document.getElementById("loginError");

  errorDiv.innerText = "";

  if(username.length < 3 || password.length < 6){
    errorDiv.innerText = "Username min 3 chars, Password min 6 chars";
    return;
  }

  const email = username + "@talkzone.app";

  try {
    // Pehle login try karo
    await auth.signInWithEmailAndPassword(email, password);
    // Agar yahan pahunch gaya toh login successful
  } catch (e) {
    console.log("Login error code:", e.code);

    if(e.code === "auth/user-not-found" || e.code === "auth/invalid-credential" || e.code === "auth/invalid-login-credentials") {
      // User nahi mila → Signup try karo
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        
        await db.collection("users").doc(cred.user.uid).set({
          name: username,
          uid: cred.user.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        console.log("New user created successfully");
      } catch (signupErr) {
        console.error(signupErr);
        if(signupErr.code === "auth/email-already-in-use"){
          errorDiv.innerText = "Wrong password ❌\nThis username is already taken.";
        } else {
          errorDiv.innerText = "Signup failed: " + signupErr.message;
        }
        return;
      }
    } 
    else if(e.code === "auth/wrong-password" || e.code === "auth/invalid-credential") {
      errorDiv.innerText = "Wrong password ❌";
    } 
    else {
      errorDiv.innerText = "Error: " + e.message;
    }
  }
}

// Baaki sab code (auth.onAuthStateChanged, loadUsers, openChat, deleteMessage etc.) same rakh sakte ho jaise last version mein tha

auth.onAuthStateChanged(user => {
  if(user){
    ME = user;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
    // ... baaki app show code
  } else {
    document.getElementById("login").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});
</script>
</body>
</html>
