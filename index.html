<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f0f2f5;height:100vh}

/* LOGIN PREMIUM */
#login{
display:flex;justify-content:center;align-items:center;height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
}
#loginBox{
background:#fff;padding:30px;border-radius:15px;width:320px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
}
#loginBox h2{margin-bottom:20px}
#login input{
width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd
}
#login button{
width:100%;padding:12px;background:#667eea;color:#fff;border:none;border-radius:8px
}

/* APP */
#app{display:none;height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:30%;background:#fff;overflow:auto;border-right:1px solid #ddd}

#searchUser{
width:90%;margin:10px;padding:10px;border-radius:20px;border:1px solid #ccc
}

.user{
padding:12px;border-bottom:1px solid #ddd;cursor:pointer
}
.user:hover{background:#eee}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column}

#chatHeader{
background:#075E54;color:#fff;padding:10px;
display:flex;justify-content:space-between
}

#messages{flex:1;padding:10px;overflow:auto}

.msg{
margin:5px;padding:10px;border-radius:10px;max-width:60%
}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

.tick{font-size:10px;margin-left:5px;color:gray}
.seen{color:blue}

#input{display:flex;padding:10px}
#input input{flex:1;padding:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="handleAuth()">Login / Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <input id="searchUser" placeholder="Search user..." onkeyup="searchUsers()">
    <div id="userList"></div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="chatHeader">
      <span id="chatName">Search user</span>
      <button onclick="toggleBlock()">Block</button>
    </div>

    <div id="messages"></div>

    <div id="input">
      <input id="msg" placeholder="Type message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>

// FIREBASE CONFIG (same working)
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null,currentChat=null,currentUser=null,unsub=null;
let myData=null;

// LOGIN (same working)
async function handleAuth(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(u.length<3||p.length<6)return alert("Invalid");

  let email=u+"@app.com";

  try{
    let snap=await db.collection("users").where("name","==",u).get();

    if(snap.empty){
      let cred=await auth.createUserWithEmailAndPassword(email,p);
      await db.collection("users").doc(cred.user.uid).set({
        name:u,uid:cred.user.uid,blocked:[]
      });
    }else{
      await auth.signInWithEmailAndPassword(email,p);
    }
  }catch(e){
    if(e.code==="auth/wrong-password") alert("Wrong password");
    else alert(e.message);
  }
}

// AUTH
auth.onAuthStateChanged(async user=>{
  if(user){
    ME=user;

    let doc=await db.collection("users").doc(user.uid).get();
    myData=doc.data();

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
  }else{
    document.getElementById("login").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

// SEARCH USERS ONLY
function searchUsers(){
  let term=document.getElementById("searchUser").value.toLowerCase();
  let box=document.getElementById("userList");

  if(term.length<1){
    box.innerHTML="";
    return;
  }

  db.collection("users").get().then(snap=>{
    box.innerHTML="";

    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid)return;

      if(u.name.includes(term)){
        let div=document.createElement("div");
        div.className="user";
        div.innerText=u.name;

        div.onclick=()=>openChat(u);
        box.appendChild(div);
      }
    });
  });
}

// OPEN CHAT
function openChat(u){
  currentUser=u;
  document.getElementById("chatName").innerText=u.name;

  currentChat=[ME.uid,u.uid].sort().join("_");

  if(unsub)unsub();

  unsub=db.collection("chats").doc(currentChat)
  .collection("messages").orderBy("time")
  .onSnapshot(snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();
      let div=document.createElement("div");
      div.className="msg "+(m.uid===ME.uid?"me":"other");

      let tick="";
      if(m.uid===ME.uid){
        tick=m.seen?"✔✔":"✔";
      }

      div.innerHTML=m.text+" <span class='tick "+(m.seen?"seen":"")+"'>"+tick+"</span>";

      // seen update
      if(m.uid!==ME.uid && !m.seen){
        doc.ref.update({seen:true});
      }

      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

// SEND
async function sendMessage(){
  let text=document.getElementById("msg").value.trim();

  if(!text||!currentChat)return;

  await db.collection("chats").doc(currentChat)
  .collection("messages").add({
    text:text,
    uid:ME.uid,
    seen:false,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("msg").value="";
}

// BLOCK
async function toggleBlock(){
  let ref=db.collection("users").doc(ME.uid);
  let arr=myData.blocked||[];

  if(arr.includes(currentUser.uid)){
    arr=arr.filter(x=>x!==currentUser.uid);
    alert("Unblocked");
  }else{
    arr.push(currentUser.uid);
    alert("Blocked");
  }

  myData.blocked=arr;
  await ref.update({blocked:arr});
}

</script>

</body>
</html>
