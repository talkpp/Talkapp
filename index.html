<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TalkApp</title>

<style>
body{margin:0;font-family:sans-serif;background:#f0f2f5}
.screen{display:none;height:100vh;flex-direction:column}
.active{display:flex}

#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#box{background:#fff;padding:25px;border-radius:12px;width:280px;text-align:center}

.header{background:#075E54;color:#fff;padding:15px}
.user{padding:12px;border-bottom:1px solid #ddd;cursor:pointer}

#messages{flex:1;overflow:auto;padding:10px;background:#ece5dd}
.msg{padding:10px;border-radius:10px;margin:5px;max-width:65%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

#input{display:flex;padding:10px;background:#fff}
#input input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="active">
  <div id="box">
    <h2>TalkApp</h2>
    <button id="googleBtn">Continue with Google</button>
  </div>
</div>

<!-- USERNAME -->
<div id="username" class="screen">
  <h3>Choose Username</h3>
  <input id="uname">
  <button id="saveBtn">Save</button>
</div>

<!-- HOME -->
<div id="home" class="screen">
  <div class="header">
    TalkApp
    <span id="logoutBtn" style="float:right">🚪</span>
  </div>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div id="chat" class="screen">
  <div class="header">
    <span id="backBtn">⬅</span>
    <span id="chatName"></span>
  </div>

  <div id="messages"></div>

  <div id="input">
    <input id="msg">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCz0Bwl9Vz79DNOnFN4t9TaEKtKKUL5m8o",
  authDomain: "talkapp-70bee.firebaseapp.com",
  projectId: "talkapp-70bee"
});

const auth = getAuth();
const db = getFirestore();

let ME,currentChat=null,unsub=null;

// UI
function show(id){
  login.classList.remove("active");
  username.classList.remove("active");
  home.classList.remove("active");
  chat.classList.remove("active");
  document.getElementById(id).classList.add("active");
}

// LOGIN
googleBtn.onclick = async()=>{
  await signInWithPopup(auth,new GoogleAuthProvider());
};

// AUTH
onAuthStateChanged(auth, async user=>{
  if(user){
    ME=user;

    let ref=doc(db,"users",user.uid);
    let snap=await getDoc(ref);

    if(!snap.exists()){
      await setDoc(ref,{name:"",uid:user.uid});
      show("username");
      return;
    }

    if(!snap.data().name){
      show("username");
    }else{
      show("home");
      loadUsers();
    }

  }else{
    show("login");
  }
});

// USERNAME
saveBtn.onclick = async()=>{
  let name=uname.value.trim().toLowerCase();
  if(name.length<3)return alert("Min 3 chars");

  let snap=await getDocs(collection(db,"users"));
  let taken=false;

  snap.forEach(d=>{
    if(d.data().name===name) taken=true;
  });

  if(taken)return alert("Taken");

  await updateDoc(doc(db,"users",ME.uid),{name:name});
  show("home");
  loadUsers();
};

// USERS
function loadUsers(){
  onSnapshot(collection(db,"users"),snap=>{
    users.innerHTML="";
    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid)return;

      let div=document.createElement("div");
      div.className="user";
      div.innerText=u.name;
      div.onclick=()=>openChat(u);

      users.appendChild(div);
    });
  });
}

// OPEN CHAT
function openChat(u){
  currentChat=[ME.uid,u.uid].sort().join("_");
  chatName.innerText=u.name;
  show("chat");

  if(unsub)unsub();

  unsub=onSnapshot(
    query(collection(db,"chats",currentChat,"messages"),orderBy("time")),
    snap=>{
      messages.innerHTML="";
      snap.forEach(d=>{
        let m=d.data();

        let div=document.createElement("div");
        div.className="msg "+(m.uid===ME.uid?"me":"other");
        div.innerText=m.text;

        messages.appendChild(div);
      });

      messages.scrollTop=messages.scrollHeight;
    }
  );
}

// SEND (FINAL FIX)
sendBtn.onclick = async()=>{
  if(!msg.value || !currentChat){
    alert("Select user first");
    return;
  }

  // create chat doc
  await setDoc(doc(db,"chats",currentChat),{
    users: currentChat.split("_")
  },{merge:true});

  // send message
  await addDoc(collection(db,"chats",currentChat,"messages"),{
    text:msg.value,
    uid:ME.uid,
    time:Date.now()
  });

  msg.value="";
};

// NAV
backBtn.onclick=()=>show("home");
logoutBtn.onclick=()=>signOut(auth);

</script>

</body>
</html>
