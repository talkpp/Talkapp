<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
body{margin:0;font-family:sans-serif}
.screen{display:none;height:100vh;flex-direction:column}
.active{display:flex}
#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#loginBox{background:#fff;padding:20px;border-radius:10px;width:300px}

#searchHeader{background:#075E54;color:#fff;padding:15px}
#searchInput{margin:10px;padding:10px;border-radius:20px;border:1px solid #ccc}
.user{padding:15px;border-bottom:1px solid #ddd;cursor:pointer}

#chatHeader{background:#075E54;color:#fff;padding:10px;display:flex;justify-content:space-between}
#messages{flex:1;padding:10px;overflow:auto;background:#ece5dd}

.msg{margin:5px;padding:10px;border-radius:10px;max-width:65%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

.tick{font-size:11px;margin-left:5px;color:gray}
.seen{color:blue}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username"><br><br>
    <input id="p" type="password" placeholder="Password"><br><br>
    <button onclick="handleAuth()">Login / Signup</button>
  </div>
</div>

<!-- SEARCH -->
<div id="searchScreen" class="screen">
  <div id="searchHeader">Search User</div>
  <input id="searchInput" placeholder="Search..." onkeyup="searchUsers()">
  <div id="userList"></div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div id="chatHeader">
    <span onclick="goBack()">⬅</span>
    <span id="chatName"></span>
    <button onclick="toggleBlock()">Block</button>
  </div>

  <div id="chatStatus"></div>
  <div id="messages"></div>
  <div id="typing"></div>

  <div style="display:flex;padding:10px">
    <input id="msg" oninput="typingNow()" style="flex:1;padding:10px">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null,currentChat=null,currentUser=null,unsub=null,myData=null,lastSend=0;

// encryption
function encrypt(t,k){return CryptoJS.AES.encrypt(t,k).toString();}
function decrypt(t,k){
  try{return CryptoJS.AES.decrypt(t,k).toString(CryptoJS.enc.Utf8);}
  catch{return "[error]";}
}

// LOGIN FIXED UNIQUE
async function handleAuth(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(u.length<3||p.length<6)return alert("Invalid");

  let email=u+"@app.com";

  try{
    let userDoc=await db.collection("usernames").doc(u).get();

    if(!userDoc.exists){
      let cred=await auth.createUserWithEmailAndPassword(email,p);

      await db.collection("usernames").doc(u).set({uid:cred.user.uid});

      await db.collection("users").doc(cred.user.uid).set({
        name:u,uid:cred.user.uid,blocked:[],lastSeen:Date.now()
      });

    }else{
      await auth.signInWithEmailAndPassword(email,p);
    }

  }catch(e){
    if(e.code==="auth/wrong-password") alert("Wrong password");
    else alert(e.message);
  }
}

// AUTH
auth.onAuthStateChanged(async user=>{
  if(user){
    ME=user;
    let doc=await db.collection("users").doc(user.uid).get();
    myData=doc.data();

    document.getElementById("login").style.display="none";
    showScreen("searchScreen");

    setInterval(()=>{
      db.collection("users").doc(ME.uid).update({lastSeen:Date.now()});
    },5000);
  }
});

// screen
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// SEARCH FIX
function searchUsers(){
  let term=document.getElementById("searchInput").value.toLowerCase();
  let box=document.getElementById("userList");

  if(term.length<1){box.innerHTML="";return;}

  db.collection("users").get().then(snap=>{
    box.innerHTML="";
    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid)return;

      if(u.name.includes(term)){
        let div=document.createElement("div");
        div.className="user";
        div.innerText=u.name;
        div.onclick=()=>openChat(u);
        box.appendChild(div);
      }
    });
  });
}

// OPEN CHAT
function openChat(u){
  if(myData.blocked?.includes(u.uid))return alert("Blocked");

  currentUser=u;
  currentChat=[ME.uid,u.uid].sort().join("_");

  document.getElementById("chatName").innerText=u.name;
  showScreen("chatScreen");

  // last seen
  db.collection("users").doc(u.uid).onSnapshot(doc=>{
    let d=doc.data();
    let diff=(Date.now()-d.lastSeen)/1000;
    document.getElementById("chatStatus").innerText=
      diff<5?"online":"last seen "+Math.floor(diff)+"s ago";
  });

  // typing
  db.collection("typing").doc(currentChat)
  .onSnapshot(doc=>{
    let d=doc.data();
    document.getElementById("typing").innerText=
      (d && d.uid!==ME.uid)?"typing...":"";
  });

  if(unsub)unsub();

  unsub=db.collection("chats").doc(currentChat)
  .collection("messages").orderBy("time")
  .onSnapshot(snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();

      let key=(m.uid===ME.uid)?currentUser.uid:ME.uid;
      let msg=decrypt(m.text,key);

      let div=document.createElement("div");
      div.className="msg "+(m.uid===ME.uid?"me":"other");

      div.innerHTML =
        (m.deleted?"<i>This message was deleted</i>":msg) +
        " <span class='tick "+(m.seen?"seen":"")+"'>" +
        (m.uid===ME.uid?(m.seen?"✔✔":"✔"):"") +
        "</span>";

      if(m.uid!==ME.uid && !m.seen){
        doc.ref.update({seen:true});
      }

      // DELETE LONG PRESS
      let timer;
      div.onmousedown=()=>{
        timer=setTimeout(()=>{
          if(m.uid===ME.uid){
            if(confirm("Delete for everyone?")){
              doc.ref.update({deleted:true});
            }
          }
        },600);
      };
      div.onmouseup=()=>clearTimeout(timer);
      div.onmouseleave=()=>clearTimeout(timer);

      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

// SEND
async function sendMessage(){
  let text=document.getElementById("msg").value.trim();
  if(!text||!currentChat)return;

  if(Date.now()-lastSend<1000)return alert("Slow down");
  lastSend=Date.now();

  if(myData.blocked?.includes(currentUser.uid))return alert("Blocked");

  let enc=encrypt(text,currentUser.uid);

  await db.collection("chats").doc(currentChat)
  .collection("messages").add({
    text:enc,
    uid:ME.uid,
    seen:false,
    deleted:false,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("msg").value="";
}

// typing
function typingNow(){
  if(!currentChat)return;

  db.collection("typing").doc(currentChat).set({uid:ME.uid});
  setTimeout(()=>db.collection("typing").doc(currentChat).delete(),1000);
}

// block
async function toggleBlock(){
  let ref=db.collection("users").doc(ME.uid);
  let arr=myData.blocked||[];

  if(arr.includes(currentUser.uid)){
    arr=arr.filter(x=>x!==currentUser.uid);
    alert("Unblocked");
  }else{
    arr.push(currentUser.uid);
    alert("Blocked");
  }

  myData.blocked=arr;
  await ref.update({blocked:arr});
}

function goBack(){showScreen("searchScreen");}
</script>

</body>
</html>
