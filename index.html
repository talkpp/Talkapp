<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:white}

/* LOGIN */
#login{display:flex;justify-content:center;align-items:center;height:100vh}
#loginBox{background:#202c33;padding:20px;border-radius:10px;width:300px}
#login input{width:100%;padding:10px;margin:8px 0;background:#111;border:none;color:white}
#login button{width:100%;padding:10px;background:#00a884;border:none;color:white}

/* APP */
#app{display:none;height:100vh;display:flex;flex-direction:row}

/* SIDEBAR */
#sidebar{width:35%;background:#111b21;overflow:auto}
.user{padding:12px;border-bottom:1px solid #222;cursor:pointer}
.user:hover{background:#202c33}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column}
#header{padding:10px;background:#202c33;display:flex;justify-content:space-between}
#status{font-size:12px;color:#aaa}

/* MENU */
#menu{position:absolute;right:10px;top:50px;background:#202c33;border-radius:8px;display:none}
#menu div{padding:10px;cursor:pointer}
#menu div:hover{background:#333}

/* MESSAGES */
#messages{flex:1;padding:10px;overflow:auto}
.msg{margin:5px 0;padding:8px;border-radius:10px;max-width:60%;position:relative}
.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

.tick{font-size:11px;margin-left:5px}
.seen{color:#53bdeb}

/* INPUT */
#input{display:none;padding:10px;background:#202c33}
#input input{flex:1;padding:10px}
#input button{padding:10px;background:#00a884;border:none;color:white}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div id="sidebar"></div>

<div id="chat">
  <div id="header">
    <div>
      <div id="chatName">Select user</div>
      <div id="status"></div>
    </div>
    <div onclick="toggleMenu()">⋮</div>
  </div>

  <div id="menu">
    <div onclick="toggleBlock()">Block / Unblock</div>
  </div>

  <div id="messages"></div>

  <div id="input">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<script>
// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let currentUser=null;
let currentChat=null;
let unsub=null;

// LOGIN
async function login(){
  let u=uEl.value.trim().toLowerCase();
  let p=pEl.value;
  let email=u+"@app.com";

  try{
    await auth.signInWithEmailAndPassword(email,p);
  }catch(e){
    const methods = await auth.fetchSignInMethodsForEmail(email);
    if(methods.length===0){
      let cred=await auth.createUserWithEmailAndPassword(email,p);
      await db.collection("users").doc(cred.user.uid).set({
        uid:cred.user.uid,
        name:u,
        blocked:[],
        lastSeen:Date.now()
      });
    }else{
      alert("Wrong password ❌");
    }
  }
}

const uEl=document.getElementById("u");
const pEl=document.getElementById("p");

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    ME=user;
    login.style.display="none";
    app.style.display="flex";
    loadUsers();
  }
});

// USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    sidebar.innerHTML="";
    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;

      let div=document.createElement("div");
      div.className="user";
      div.innerText=u.name;
      div.onclick=()=>openChat(u);
      sidebar.appendChild(div);
    });
  });
}

// CHAT
function openChat(u){
  currentUser=u;
  chatName.innerText=u.name;
  currentChat=[ME.uid,u.uid].sort().join("_");

  input.style.display="flex";

  if(unsub) unsub();

  unsub=db.collection("chats").doc(currentChat)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    messages.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();
      let div=document.createElement("div");
      div.className="msg "+(m.uid===ME.uid?"me":"other");

      let tick = m.seen ? `<span class="tick seen">✔✔</span>`:`<span class="tick">✔</span>`;

      div.innerHTML = m.deleted ? "<i>Deleted</i>" :
        m.text + (m.uid===ME.uid?tick:"");

      // seen
      if(m.uid!==ME.uid && !m.seen){
        d.ref.update({seen:true});
      }

      // long press delete
      div.oncontextmenu=(e)=>{
        e.preventDefault();
        if(m.uid===ME.uid){
          if(confirm("Delete for everyone?")){
            d.ref.update({deleted:true,text:""});
          }
        }
      };

      messages.appendChild(div);
    });

    messages.scrollTop=messages.scrollHeight;
  });
}

// SEND
async function send(){
  let text=msg.value.trim();
  if(!text || !currentUser) return;

  let meDoc=await db.collection("users").doc(ME.uid).get();
  let otherDoc=await db.collection("users").doc(currentUser.uid).get();

  if((meDoc.data().blocked||[]).includes(currentUser.uid)) return alert("Blocked");
  if((otherDoc.data().blocked||[]).includes(ME.uid)) return alert("You are blocked");

  await db.collection("chats").doc(currentChat)
  .collection("messages").add({
    text:text,
    uid:ME.uid,
    seen:false,
    deleted:false,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });

  msg.value="";
}

// BLOCK
async function toggleBlock(){
  let ref=db.collection("users").doc(ME.uid);
  let doc=await ref.get();
  let arr=doc.data().blocked||[];

  if(arr.includes(currentUser.uid)){
    arr=arr.filter(id=>id!==currentUser.uid);
    alert("Unblocked");
  }else{
    arr.push(currentUser.uid);
    alert("Blocked");
  }

  await ref.update({blocked:arr});
}

// MENU
function toggleMenu(){
  menu.style.display = menu.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
