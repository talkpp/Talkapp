<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script><style>
body{margin:0;font-family:sans-serif}

/* LOGIN */
#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#loginBox{background:#fff;padding:20px;border-radius:10px;width:300px}
#login input{width:100%;padding:10px;margin:8px 0}
#login button{width:100%;padding:10px;background:#667eea;color:#fff;border:none;cursor:pointer}

/* APP */
#app{display:none;height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:30%;background:#f0f2f5;overflow:auto}
.user{padding:12px;border-bottom:1px solid #ddd;cursor:pointer}
.user:hover{background:#ddd}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;padding:10px;overflow:auto}
.msg{margin:5px 0;padding:8px;border-radius:10px;max-width:60%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

#input{display:flex;padding:10px;border-top:1px solid #ccc}
#input input{flex:1;padding:10px}
#input button{padding:10px}
</style></head><body><!-- LOGIN --><div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
  </div>
</div><!-- APP --><div id="app">
  <div id="sidebar"></div>  <div id="chat">
    <div id="messages"></div>
    <div id="input">
      <input id="msg" placeholder="Type message">
      <button onclick="send()">Send</button>
    </div>
  </div>
</div><script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let currentChat=null;
let unsub=null;

// 🔐 LOGIN / SIGNUP FIXED
async function login(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(u.length<3 || p.length<6){
    alert("Invalid input");
    return;
  }

  let email=u+"@app.com";

  try{
    await auth.signInWithEmailAndPassword(email,p);
  }catch(e){
    if(e.code==="auth/user-not-found"){
      let cred = await auth.createUserWithEmailAndPassword(email,p);

      await db.collection("users").doc(cred.user.uid).set({
        name:u,
        uid:cred.user.uid
      });

    }else{
      alert("Wrong password ❌");
    }
  }
}

// 🔄 AUTH STATE FIX
auth.onAuthStateChanged(user=>{
  if(user){
    ME=user;

    // 👇 ONLY AFTER LOGIN SHOW APP
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";

    loadUsers();
  }else{
    // 👇 FORCE LOGIN SCREEN
    document.getElementById("login").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

// 👥 USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let box=document.getElementById("sidebar");
    box.innerHTML="";

    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;

      let div=document.createElement("div");
      div.className="user";
      div.innerText=u.name;

      div.onclick=()=>openChat(u.uid);
      box.appendChild(div);
    });
  });
}

// 💬 CHAT
function openChat(uid){
  currentChat=[ME.uid,uid].sort().join("_");

  if(unsub) unsub();

  unsub=db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{
      let box=document.getElementById("messages");
      box.innerHTML="";

      snap.forEach(d=>{
        let m=d.data();
        let div=document.createElement("div");
        div.className="msg "+(m.uid===ME.uid?"me":"other");
        div.innerText=m.text;
        box.appendChild(div);
      });

      box.scrollTop=box.scrollHeight;
    });
}

// 📩 SEND
async function send(){
  let text=document.getElementById("msg").value.trim();

  if(!text || !currentChat) return;

  await db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .add({
      text:text,
      uid:ME.uid,
      time: firebase.firestore.FieldValue.serverTimestamp()
    });

  document.getElementById("msg").value="";
}

</script></body>
</html>
