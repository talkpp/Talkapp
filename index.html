<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TalkApp Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00a884;--green-dark:#008069;--bg:#111b21;--panel:#202c33;--panel2:#2a3942;--text:#e9edef;--text-muted:#8696a0;--border:#2a3942;--bubble-me:#005c4b;--bubble-other:#202c33;--input-bg:#2a3942;--hover:#2a3942;--tick-blue:#53bdeb;--radius:8px;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

.screen{display:none;height:100vh;flex-direction:column}
.active{display:flex!important}

#login{display:flex;justify-content:center;align-items:center;height:100vh;background:var(--bg);flex-direction:column;}
.login-logo{width:72px;height:72px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 0 40px rgba(0,168,132,0.35);}
.login-logo svg{width:42px;height:42px;fill:#fff}
.login-title{font-size:28px;font-weight:600;color:var(--text);margin-bottom:8px;}
.login-sub{font-size:14px;color:var(--text-muted);margin-bottom:36px;text-align:center;max-width:260px;line-height:1.5}
#googleBtn{display:flex;align-items:center;gap:12px;background:#fff;color:#3c4043;border:none;border-radius:24px;padding:12px 28px;font-size:15px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,0.4);transition:all .2s;}
#googleBtn:hover{transform:translateY(-1px);}
#googleBtn img{width:20px;height:20px}

#usernameScreen{background:var(--bg);justify-content:center;align-items:center;}
.username-card{background:var(--panel);border-radius:16px;padding:36px 32px;width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.username-card h3{font-size:20px;font-weight:600;margin-bottom:8px;color:var(--text)}
.username-card p{font-size:13px;color:var(--text-muted);margin-bottom:24px}
.username-card input{width:100%;padding:13px 16px;background:var(--input-bg);border:2px solid transparent;border-radius:var(--radius);color:var(--text);font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:.2s;margin-bottom:16px;}
.username-card input:focus{border-color:var(--green)}
.username-card button{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;}

#homeScreen{background:var(--bg)}
.app-header{background:var(--panel);padding:16px 20px 0;border-bottom:1px solid var(--border);}
.header-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;}
.header-top h1{font-size:20px;font-weight:700;color:var(--text);}
.header-actions{display:flex;gap:6px}
.icon-btn{width:36px;height:36px;background:transparent;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:.15s;}
.icon-btn:hover{background:var(--hover);color:var(--text)}
.tabs{display:flex}
.tab{flex:1;text-align:center;padding:10px 0;font-size:13px;font-weight:600;color:var(--text-muted);border-bottom:3px solid transparent;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

#chatList{flex:1;overflow-y:auto}
.chatItem{display:flex;align-items:center;gap:14px;padding:13px 20px;cursor:pointer;border-bottom:1px solid rgba(42,57,66,0.5);transition:.12s;}
.chatItem:hover{background:var(--hover)}
.avatar{width:46px;height:46px;min-width:46px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:600;color:var(--text);text-transform:uppercase;}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:16px;font-weight:500;color:var(--text)}
.chat-preview{font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.online-dot{width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--panel);position:absolute;bottom:0;right:0;}
.avatar-wrap{position:relative;flex-shrink:0}

#searchScreen{background:var(--bg)}
.search-header{background:var(--panel);display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);}
.search-bar{flex:1;display:flex;align-items:center;gap:10px;background:var(--input-bg);border-radius:var(--radius);padding:0 14px;}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;padding:11px 0;}
.search-bar input::placeholder{color:var(--text-muted)}
#userList{flex:1;overflow-y:auto}
.no-result{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:14px;}

#chatScreen {
    display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: var(--bg);
}
.chat-header {
    background:var(--panel); display:flex; align-items:center; gap:12px; padding:10px 16px; 
    border-bottom:1px solid var(--border); flex-shrink: 0; z-index: 10;
}
.chat-header-info{flex:1}
.chat-header-info .name{font-size:16px;font-weight:600;color:var(--text)}
.chat-header-info .status-line{font-size:12px;color:var(--green);margin-top:1px}
.chat-header-info .status-line.offline{color:var(--text-muted)}

#typing{font-size:12px;color:var(--green);padding:4px 20px 0;height:20px;font-style:italic;}
#messages {
    flex: 1; overflow-y: auto; padding: 12px 6% 80px; background: var(--bg);
    display: flex; flex-direction: column; justify-content: flex-end; gap: 6px; min-height: 0;
}
#messages::-webkit-scrollbar{width:5px}
#messages::-webkit-scrollbar-thumb{background:var(--panel2);border-radius:10px}

.msg{display:flex;flex-direction:column;max-width:65%;margin-bottom:4px;}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:8px 12px;border-radius:var(--radius);font-size:14.5px;line-height:1.45;word-break:break-word;position:relative;}
.msg.me .msg-bubble{background:var(--bubble-me);border-bottom-right-radius:2px;color:#e9edef;}
.msg.other .msg-bubble{background:var(--bubble-other);border-bottom-left-radius:2px;color:#e9edef;}
.msg-meta{display:flex;align-items:center;gap:4px;margin-top:3px;justify-content:flex-end;}
.msg-time{font-size:11px;color:var(--text-muted)}
.tick{display:flex;align-items:center;color:var(--text-muted);line-height:1;}
.tick.blue{color:var(--tick-blue)}
.reply-preview{background:rgba(0,0,0,0.2);border-left:3px solid var(--green);border-radius:4px;padding:5px 8px;margin-bottom:5px;font-size:12px;color:var(--text-muted);}
.reaction-badge{font-size:16px;position:absolute;bottom:-10px;right:6px;background:var(--panel);border-radius:10px;padding:1px 5px;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.msg-wrapper{display:flex;flex-direction:column;margin-bottom:6px;}

#replyBox{background:var(--panel2);border-left:4px solid var(--green);padding:8px 14px;margin:0 14px;border-radius:0 var(--radius) var(--radius) 0;font-size:13px;color:var(--text-muted);display:none;align-items:center;justify-content:space-between;}
#replyClose{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:0 0 0 10px;}
.input-area{background:var(--panel);padding:10px 14px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border);flex-shrink:0;}
.input-area input{flex:1;background:var(--input-bg);border:none;border-radius:24px;padding:11px 18px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;outline:none;}
.input-area input::placeholder{color:var(--text-muted)}
#sendBtn{width:44px;height:44px;min-width:44px;background:var(--green);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
#sendBtn:hover{background:var(--green-dark)}
#sendBtn svg{width:20px;height:20px;fill:#fff;transform:translateX(1px)}
#blockBtn{background:transparent;border:1px solid rgba(255,100,100,0.5);color:#ff6b6b;border-radius:6px;padding:5px 10px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;}
#blockBtn:hover{background:rgba(255,100,100,0.1)}

.emoji-picker{position:fixed;z-index:999;background:var(--panel2);border-radius:28px;padding:8px 12px;display:flex;gap:8px;box-shadow:0 4px 24px rgba(0,0,0,0.5);font-size:22px;animation:popIn .12s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.emoji-picker span{cursor:pointer;transition:.1s;line-height:1}
.emoji-picker span:hover{transform:scale(1.3)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <div class="login-logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.82.487 3.53 1.338 5.01L2 22l5.09-1.323A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a7.96 7.96 0 01-4.07-1.118l-.29-.172-3.02.785.804-2.942-.19-.302A7.93 7.93 0 014 12c0-4.418 3.582-8 8-8s8 3.582 8 8-3.582 8-8 8zm4.406-5.845c-.242-.121-1.43-.705-1.652-.786-.222-.08-.384-.121-.545.121-.162.242-.626.786-.768.948-.141.161-.283.182-.525.06-.242-.121-1.02-.375-1.943-1.196-.718-.64-1.203-1.43-1.344-1.672-.141-.242-.015-.373.106-.493.109-.108.242-.283.363-.424.12-.142.16-.242.24-.404.08-.162.04-.303-.02-.424-.06-.121-.545-1.313-.747-1.797-.197-.473-.397-.408-.545-.416l-.464-.008c-.162 0-.424.06-.646.303-.222.242-.848.829-.848 2.022 0 1.192.868 2.344.989 2.506.12.161 1.71 2.61 4.144 3.659.58.25 1.031.4 1.383.511.581.185 1.11.159 1.528.097.466-.069 1.43-.585 1.631-1.15.202-.565.202-1.05.141-1.15-.06-.1-.222-.162-.464-.283z"/></svg>
  </div>
  <div class="login-title">TalkApp Pro</div>
  <div class="login-sub">Fast, secure & private messaging for everyone</div>
  <button id="googleBtn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
    Continue with Google
  </button>
</div>

<!-- USERNAME SCREEN -->
<div id="usernameScreen" class="screen">
  <div class="username-card">
    <h3>Choose a Username</h3>
    <p>This is how people will find you on TalkApp.</p>
    <input id="usernameInput" placeholder="e.g. john_doe" autocomplete="off">
    <button id="saveUsername">Get Started</button>
  </div>
</div>

<!-- HOME SCREEN -->
<div id="homeScreen" class="screen">
  <div class="app-header">
    <div class="header-top">
      <h1>TalkApp</h1>
      <div class="header-actions">
        <button class="icon-btn" id="searchBtn" title="Search users">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="icon-btn" id="logoutBtn" title="Logout">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="tabs"><div class="tab active">Chats</div></div>
  </div>
  <div id="chatList"></div>
</div>

<!-- SEARCH SCREEN -->
<div id="searchScreen" class="screen">
  <div class="search-header">
    <button class="icon-btn" id="backBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8696a0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" placeholder="Search by username..." autocomplete="off">
    </div>
  </div>
  <div id="userList"></div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" class="screen">
  <div class="chat-header">
    <button class="icon-btn" id="backBtn2">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="avatar-wrap">
      <div class="avatar" id="chatAvatar">?</div>
      <div class="online-dot" id="chatOnlineDot" style="display:none"></div>
    </div>
    <div class="chat-header-info">
      <div class="name" id="chatName"></div>
      <div class="status-line offline" id="statusLine">last seen recently</div>
    </div>
    <button id="blockBtn">Block</button>
  </div>
  <div id="typing"></div>
  <div id="messages"></div>
  <div id="replyBox">
    <span id="replyText"></span>
    <button id="replyClose">✕</button>
  </div>
  <div class="input-area">
    <input id="msgInput" placeholder="Message...">
    <button id="sendBtn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- EMOJI PICKER -->
<div class="emoji-picker" id="emojiPicker" style="display:none">
  <span data-e="😂">😂</span>
  <span data-e="❤️">❤️</span>
  <span data-e="👍">👍</span>
  <span data-e="🔥">🔥</span>
  <span data-e="😮">😮</span>
  <span data-e="😢">😢</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCz0Bwl9Vz79DNOnFN4t9TaEKtKKUL5m8o",
  authDomain: "talkapp-70bee.firebaseapp.com",
  projectId: "talkapp-70bee"
});
const auth = getAuth(app);
const db = getFirestore(app);

let ME = null, myData = null;
let currentUser = null, currentChatId = null;
let replyMsg = null;
let unsubMessages = null, unsubPresence = null, unsubTyping = null, unsubChatList = null;
let typingClearTimer = null;

const $ = id => document.getElementById(id);

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

function avatarLetter(name) { return name ? name[0].toUpperCase() : "?"; }
function formatTime(ts) { return ts ? new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : ""; }
function lastSeenText(lastSeen) {
  const sec = Math.floor((Date.now() - lastSeen) / 1000);
  if (sec < 60) return "last seen just now";
  if (sec < 3600) return `last seen ${Math.floor(sec / 60)} min ago`;
  if (sec < 86400) return `last seen ${Math.floor(sec / 3600)} hrs ago`;
  return `last seen ${Math.floor(sec / 86400)} days ago`;
}

const TICK_SINGLE = `<svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5l4 4 8-8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const TICK_DOUBLE = `<svg width="18" height="10" viewBox="0 0 18 10" fill="none"><path d="M1 5l4 4 8-8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 5l4 4 8-8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function cleanupChatListeners() {
  if (unsubMessages) unsubMessages();
  if (unsubPresence) unsubPresence();
  if (unsubTyping) unsubTyping();
  if (typingClearTimer) clearTimeout(typingClearTimer);
  unsubMessages = unsubPresence = unsubTyping = typingClearTimer = null;
}

// Auth
$("googleBtn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());

onAuthStateChanged(auth, async user => {
  if (!user) { showLogin(); return; }
  hideLogin();
  ME = user;

  const ref = doc(db, "users", ME.uid);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, { name: "", uid: ME.uid, blocked: [], lastSeen: Date.now(), online: true });
    show("usernameScreen");
    return;
  }

  myData = snap.data();
  await updateDoc(ref, { online: true, lastSeen: Date.now() });

  window.addEventListener("beforeunload", () => updateDoc(ref, { online: false, lastSeen: Date.now() }));

  if (!myData.name) show("usernameScreen");
  else { show("homeScreen"); loadChatList(); }
});

function showLogin() { $("login").style.display = "flex"; }
function hideLogin() { $("login").style.display = "none"; }

// Username Setup
$("saveUsername").onclick = async () => {
  let name = $("usernameInput").value.toLowerCase().trim().replace(/\s+/g, "_");
  if (!name) return;
  const snap = await getDocs(collection(db, "users"));
  let taken = false;
  snap.forEach(d => { if (d.data().name === name && d.id !== ME.uid) taken = true; });
  if (taken) { alert("Username taken! Try another."); return; }

  await updateDoc(doc(db, "users", ME.uid), { name });
  myData.name = name;
  show("homeScreen");
  loadChatList();
};

// Chat List
function loadChatList() {
  if (unsubChatList) unsubChatList();
  unsubChatList = onSnapshot(collection(db, "chats"), async snap => {
    $("chatList").innerHTML = "";
    const promises = [];
    snap.forEach(d => {
      const parts = d.id.split("_");
      if (!parts.includes(ME.uid)) return;
      const otherUid = parts.find(p => p !== ME.uid);
      if (otherUid) promises.push(getDoc(doc(db, "users", otherUid)).then(doc => doc.exists() ? {chatId: d.id, user: doc.data()} : null));
    });
    const results = (await Promise.all(promises)).filter(Boolean);
    results.forEach(({user: u}) => {
      const div = document.createElement("div");
      div.className = "chatItem";
      div.innerHTML = `
        <div class="avatar-wrap">
          <div class="avatar">${avatarLetter(u.name)}</div>
          ${u.online ? `<div class="online-dot"></div>` : ""}
        </div>
        <div class="chat-info">
          <div class="chat-name">${u.name}</div>
          <div class="chat-preview">${u.online ? `<span style="color:var(--green)">online</span>` : lastSeenText(u.lastSeen)}</div>
        </div>`;
      div.onclick = () => openChat(u);
      $("chatList").appendChild(div);
    });
  });
}

// Search
$("searchBtn").onclick = () => { $("searchInput").value = ""; $("userList").innerHTML = ""; show("searchScreen"); };
$("backBtn").onclick = () => show("homeScreen");

$("searchInput").oninput = async () => {
  const term = $("searchInput").value.toLowerCase().trim();
  const list = $("userList");
  list.innerHTML = "";
  if (!term) return;

  const snap = await getDocs(collection(db, "users"));
  let found = 0;
  snap.forEach(d => {
    const u = d.data();
    if (!u.name || u.uid === ME.uid || !u.name.toLowerCase().includes(term)) return;
    found++;
    const div = document.createElement("div");
    div.className = "chatItem";
    div.innerHTML = `
      <div class="avatar-wrap">
        <div class="avatar">${avatarLetter(u.name)}</div>
        ${u.online ? `<div class="online-dot"></div>` : ""}
      </div>
      <div class="chat-info">
        <div class="chat-name">${u.name}</div>
        <div class="chat-preview">${u.online ? `<span style="color:var(--green)">online</span>` : lastSeenText(u.lastSeen)}</div>
      </div>`;
    div.onclick = () => openChat(u);
    list.appendChild(div);
  });
  if (found === 0) list.innerHTML = `<div class="no-result">No user found for "<b>${term}</b>"</div>`;
};

// Open Chat (Fixed + Smooth)
async function openChat(u) {
  if (myData.blocked?.includes(u.uid)) {
    alert("You've blocked this user. Unblock to chat.");
    return;
  }

  cleanupChatListeners();

  currentUser = u;
  currentChatId = [ME.uid, u.uid].sort().join("_");

  $("chatNa
