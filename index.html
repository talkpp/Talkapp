<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:white}
#login{display:flex;justify-content:center;align-items:center;height:100vh}
#loginBox{background:#202c33;padding:20px;border-radius:10px;width:300px}
#login input{width:100%;padding:10px;margin:8px 0;background:#111;border:none;color:white}
#login button{width:100%;padding:10px;background:#00a884;border:none;color:white}

#app{display:none;height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:35%;background:#111b21;overflow:auto}
.user{padding:12px;display:flex;gap:12px;align-items:center;cursor:pointer}
.user:hover{background:#202c33}

.avatar{
width:45px;height:45px;border-radius:50%;
background:linear-gradient(135deg,#6a5acd,#8a2be2);
display:flex;align-items:center;justify-content:center;
font-weight:bold;font-size:18px;
}

.name{font-weight:600}
.status{font-size:12px;color:#8696a0}

/* SEARCH */
#searchBox{padding:10px}
#search{
width:100%;padding:10px;border-radius:20px;
border:none;background:#202c33;color:white
}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;padding:10px;overflow:auto}
.msg{margin:5px 0;padding:8px;border-radius:10px;max-width:60%}
.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

#input{display:flex;padding:10px;background:#202c33}
#input input{flex:1;padding:10px;border:none}
#input button{padding:10px;background:#00a884;border:none;color:white}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">

    <div id="searchBox">
      <input id="search" placeholder="Search...">
    </div>

    <div id="userList"></div>

  </div>

  <!-- CHAT -->
  <div id="chat">
    <div id="messages"></div>
    <div id="input">
      <input id="msg" placeholder="Message">
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let ALL_USERS=[];
let currentChat=null;
let unsub=null;

// LOGIN
async function login(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(!u || p.length<6) return alert("Invalid");

  let email=u+"@app.com";

  try{
    await auth.signInWithEmailAndPassword(email,p);
  }catch{
    let cred=await auth.createUserWithEmailAndPassword(email,p);

    await db.collection("users").doc(cred.user.uid).set({
      uid:cred.user.uid,
      name:u,
      lastSeen:Date.now()
    });
  }
}

// AUTH STATE
auth.onAuthStateChanged(async user=>{
  if(user){
    ME=user;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";

    // update last seen
    db.collection("users").doc(user.uid).update({
      lastSeen:Date.now()
    });

    loadUsers();
  }
});

// LOAD USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    ALL_USERS=[];

    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;
      ALL_USERS.push(u);
    });

    renderUsers(ALL_USERS);
  });
}

// RENDER USERS
function renderUsers(list){
  let box=document.getElementById("userList");
  box.innerHTML="";

  list.forEach(u=>{
    let div=document.createElement("div");
    div.className="user";

    div.innerHTML=`
      <div class="avatar">${u.name[0].toUpperCase()}</div>
      <div>
        <div class="name">${u.name}</div>
        <div class="status">${lastSeen(u.lastSeen)}</div>
      </div>
    `;

    div.onclick=()=>openChat(u);
    box.appendChild(div);
  });
}

// SEARCH
document.getElementById("search").addEventListener("input",(e)=>{
  let val=e.target.value.toLowerCase();

  let filtered=ALL_USERS.filter(u=>
    u.name.toLowerCase().includes(val)
  );

  renderUsers(filtered);
});

// LAST SEEN FORMAT
function lastSeen(t){
  if(!t) return "Offline";
  let diff=Math.floor((Date.now()-t)/60000);

  if(diff<1) return "Online";
  if(diff<60) return "Last seen "+diff+" min ago";

  let h=Math.floor(diff/60);
  return "Last seen "+h+" hr ago";
}

// OPEN CHAT
function openChat(user){
  currentChat=[ME.uid,user.uid].sort().join("_");

  if(unsub) unsub();

  unsub=db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{
      let box=document.getElementById("messages");
      box.innerHTML="";

      snap.forEach(d=>{
        let m=d.data();
        let div=document.createElement("div");
        div.className="msg "+(m.uid===ME.uid?"me":"other");
        div.innerText=m.text;
        box.appendChild(div);
      });

      box.scrollTop=box.scrollHeight;
    });
}

// SEND
async function send(){
  let input=document.getElementById("msg");
  let text=input.value.trim();

  if(!text || !currentChat) return;

  await db.collection("chats").doc(currentChat)
    .collection("messages")
    .add({
      text:text,
      uid:ME.uid,
      time:firebase.firestore.FieldValue.serverTimestamp()
    });

  input.value="";
}
</script>

</body>
  </html>
