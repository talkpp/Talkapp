<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TalkApp Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#f0f2f5}
.screen{display:none;height:100vh;flex-direction:column}
.active{display:flex}

#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#box{background:#fff;padding:25px;border-radius:12px;text-align:center}

.header{background:#075E54;color:#fff;padding:15px}
.chatItem{padding:12px;border-bottom:1px solid #ddd;cursor:pointer}
.chatItem:hover{background:#eee}

#messages{flex:1;overflow:auto;padding:10px;background:#ece5dd}
.msg{padding:10px;border-radius:10px;margin:5px;max-width:65%;position:relative}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

.tick{font-size:12px;margin-left:5px}
.blue{color:blue}

.reaction{position:absolute;bottom:-10px;right:10px;font-size:14px}

#input{display:flex;padding:10px;background:#fff}
#input input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc}
#replyBox{background:#eee;padding:5px;display:none}
</style>
</head>

<body>

<div id="login">
  <div id="box">
    <h2>TalkApp</h2>
    <button id="googleBtn">Continue with Google</button>
  </div>
</div>

<div id="usernameScreen" class="screen">
  <h3>Choose Username</h3>
  <input id="usernameInput">
  <button id="saveUsername">Save</button>
</div>

<div id="homeScreen" class="screen">
  <div class="header">
    TalkApp
    <span id="logoutBtn" style="float:right">🚪</span>
    <span id="searchBtn" style="float:right;margin-right:10px">🔍</span>
  </div>
  <div id="chatList"></div>
</div>

<div id="searchScreen" class="screen">
  <div class="header"><span id="backBtn">⬅</span> Search</div>
  <input id="searchInput">
  <div id="userList"></div>
</div>

<div id="chatScreen" class="screen">
  <div class="header">
    <span id="backBtn2">⬅</span>
    <span id="chatName"></span>
    <button id="blockBtn" style="float:right">Block</button>
  </div>

  <div id="status"></div>
  <div id="typing"></div>
  <div id="messages"></div>

  <div id="replyBox"></div>

  <div id="input">
    <input id="msg">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCz0Bwl9Vz79DNOnFN4t9TaEKtKKUL5m8o",
  authDomain: "talkapp-70bee.firebaseapp.com",
  projectId: "talkapp-70bee"
});

const auth=getAuth();
const db=getFirestore();

let ME,currentUser,currentChat,replyMsg=null,myData=null,unsub=null;

// UI
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// LOGIN
googleBtn.onclick=()=>signInWithPopup(auth,new GoogleAuthProvider());

// AUTH
onAuthStateChanged(auth,async user=>{
if(user){
document.getElementById("login").style.display="none";
ME=user;

let ref=doc(db,"users",user.uid);
let snap=await getDoc(ref);

if(!snap.exists()){
await setDoc(ref,{name:"",uid:user.uid,blocked:[],lastSeen:Date.now(),online:true});
show("usernameScreen");
return;
}

myData=snap.data();

if(!myData.name) show("usernameScreen");
else{show("homeScreen");loadChats();}

setInterval(()=>updateDoc(doc(db,"users",ME.uid),{lastSeen:Date.now(),online:true}),5000);

window.onbeforeunload=()=>{
updateDoc(doc(db,"users",ME.uid),{online:false,lastSeen:Date.now()});
};

}else{
document.getElementById("login").style.display="flex";
}
});

// USERNAME
saveUsername.onclick=async()=>{
let name=usernameInput.value.toLowerCase();
let snap=await getDocs(collection(db,"users"));
let taken=false;
snap.forEach(d=>{if(d.data().name===name)taken=true});
if(taken)return alert("Taken");
await updateDoc(doc(db,"users",ME.uid),{name:name});
show("homeScreen");loadChats();
};

// CHAT LIST
function loadChats(){
onSnapshot(collection(db,"chats"),async snap=>{
chatList.innerHTML="";
for(let d of snap.docs){
let id=d.id;
if(!id.includes(ME.uid))continue;

let other=id.replace(ME.uid,"").replace("_","");
let udoc=await getDoc(doc(db,"users",other));
if(!udoc.exists())continue;

let u=udoc.data();

let div=document.createElement("div");
div.className="chatItem";
div.innerText=u.name;
div.onclick=()=>openChat(u);
chatList.appendChild(div);
}
});
}

// SEARCH
searchBtn.onclick=()=>show("searchScreen");
backBtn.onclick=()=>show("homeScreen");

searchInput.onkeyup=async()=>{
let term=searchInput.value.toLowerCase();
userList.innerHTML="";
let snap=await getDocs(collection(db,"users"));
snap.forEach(d=>{
let u=d.data();
if(u.uid!==ME.uid && u.name.includes(term)){
let div=document.createElement("div");
div.className="chatItem";
div.innerText=u.name;
div.onclick=()=>openChat(u);
userList.appendChild(div);
}
});
};

// OPEN CHAT
function openChat(u){

if(myData.blocked?.includes(u.uid)) return alert("Blocked");

currentUser=u;
currentChat=[ME.uid,u.uid].sort().join("_");
chatName.innerText=u.name;
show("chatScreen");

// online
onSnapshot(doc(db,"users",u.uid),d=>{
let data=d.data();
status.innerText=data.online?"online":"last seen";
});

// typing
onSnapshot(doc(db,"typing",currentChat),d=>{
if(!d.exists()) return typing.innerText="";
let t=d.data();
typing.innerText=(t.uid!==ME.uid && Date.now()-t.time<2000)?"typing...":"";
});

// messages
if(unsub)unsub();

unsub=onSnapshot(query(collection(db,"chats",currentChat,"messages"),orderBy("time")),snap=>{
messages.innerHTML="";
snap.forEach(docu=>{
let m=docu.data();

let div=document.createElement("div");
div.className="msg "+(m.uid===ME.uid?"me":"other");

let tick=m.uid===ME.uid?(m.seen?"<span class='tick blue'>✔✔</span>":"✔"):"";

let replyHTML=m.reply?`<small>↩ ${m.reply}</small><br>`:"";

div.innerHTML=replyHTML+(m.deleted?"<i>deleted</i>":m.text)+tick;

if(m.reaction){
let r=document.createElement("div");
r.className="reaction";
r.innerText=m.reaction;
div.appendChild(r);
}

// seen
if(m.uid!==ME.uid && !m.seen){
updateDoc(doc(db,"chats",currentChat,"messages",docu.id),{seen:true});
}

// reply
div.onclick=()=>{
replyMsg=m.text;
replyBox.style.display="block";
replyBox.innerText="Reply: "+m.text;
};

// reaction
div.oncontextmenu=e=>{
e.preventDefault();
let emoji=prompt("React: 😂 ❤️ 👍 🔥");
if(emoji){
updateDoc(doc(db,"chats",currentChat,"messages",docu.id),{reaction:emoji});
}
};

messages.appendChild(div);
});
messages.scrollTop=messages.scrollHeight;
});
}

// SEND
sendBtn.onclick=async()=>{
if(!msg.value||!currentChat)return;

await setDoc(doc(db,"chats",currentChat),{users:currentChat.split("_")},{merge:true});

await addDoc(collection(db,"chats",currentChat,"messages"),{
text:msg.value,
uid:ME.uid,
seen:false,
deleted:false,
reply:replyMsg||null,
time:Date.now()
});

replyMsg=null;
replyBox.style.display="none";
msg.value="";
};

// typing
msg.oninput=()=>{
if(!currentChat)return;
setDoc(doc(db,"typing",currentChat),{uid:ME.uid,time:Date.now()});
};

// block
blockBtn.onclick=async()=>{
let arr=myData.blocked||[];
if(arr.includes(currentUser.uid))arr=arr.filter(x=>x!==currentUser.uid);
else arr.push(currentUser.uid);
myData.blocked=arr;
await updateDoc(doc(db,"users",ME.uid),{blocked:arr});
alert("Updated");
};

// nav
backBtn2.onclick=()=>show("homeScreen");
logoutBtn.onclick=()=>signOut(auth);

</script>
</body>
</html>
