<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TalkApp Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#f0f2f5}
.screen{display:none;height:100vh;flex-direction:column}
.active{display:flex}

/* LOGIN */
#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#box{background:#fff;padding:25px;border-radius:12px;width:280px;text-align:center}

/* HEADER */
.header{background:#075E54;color:#fff;padding:15px;font-size:18px}

/* CHAT LIST */
.chatItem{
  padding:12px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}
.chatItem:hover{background:#eee}
.name{font-weight:bold}
.last{font-size:13px;color:gray}

/* CHAT */
#messages{flex:1;overflow:auto;padding:10px;background:#ece5dd}
.msg{padding:10px;border-radius:10px;margin:5px;max-width:65%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

#input{display:flex;padding:10px;background:#fff}
#input input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="box">
    <h2>TalkApp</h2>
    <button id="googleBtn">Continue with Google</button>
  </div>
</div>

<!-- USERNAME -->
<div id="usernameScreen" class="screen">
  <h3>Choose Username</h3>
  <input id="usernameInput">
  <button id="saveUsername">Save</button>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="header">
    TalkApp
    <span id="logoutBtn" style="float:right">🚪</span>
    <span id="searchBtn" style="float:right;margin-right:10px">🔍</span>
  </div>
  <div id="chatList"></div>
</div>

<!-- SEARCH -->
<div id="searchScreen" class="screen">
  <div class="header">
    <span id="backBtn">⬅</span> Search
  </div>
  <input id="searchInput" placeholder="Search user...">
  <div id="userList"></div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div class="header">
    <span id="backBtn2">⬅</span>
    <span id="chatName"></span>
  </div>

  <div id="messages"></div>

  <div id="input">
    <input id="msg">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCz0Bwl9Vz79DNOnFN4t9TaEKtKKUL5m8o",
  authDomain: "talkapp-70bee.firebaseapp.com",
  projectId: "talkapp-70bee"
});

const auth = getAuth();
const db = getFirestore();

let ME,currentChat=null,unsub=null;

// UI
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// LOGIN
googleBtn.onclick = async()=>{
  await signInWithPopup(auth,new GoogleAuthProvider());
};

// AUTH
onAuthStateChanged(auth, async user=>{
  if(user){

    document.getElementById("login").style.display="none";

    ME=user;

    let ref=doc(db,"users",user.uid);
    let snap=await getDoc(ref);

    if(!snap.exists()){
      await setDoc(ref,{name:"",uid:user.uid});
      show("usernameScreen");
      return;
    }

    if(!snap.data().name){
      show("usernameScreen");
    }else{
      show("homeScreen");
      loadChats(); // 🔥 FIX
    }

  }else{
    document.getElementById("login").style.display="flex";
  }
});

// USERNAME
saveUsername.onclick = async()=>{
  let name=usernameInput.value.trim().toLowerCase();
  if(name.length<3)return alert("Min 3 chars");

  let snap=await getDocs(collection(db,"users"));
  let taken=false;

  snap.forEach(d=>{
    if(d.data().name===name) taken=true;
  });

  if(taken)return alert("Taken");

  await updateDoc(doc(db,"users",ME.uid),{name:name});
  show("homeScreen");
  loadChats();
};

// 🔥 CHAT LIST (PRO FIX)
function loadChats(){
  onSnapshot(collection(db,"chats"),async snap=>{
    chatList.innerHTML="";

    for(let d of snap.docs){
      let id=d.id;

      if(!id.includes(ME.uid)) continue;

      let other=id.replace(ME.uid,"").replace("_","");
      let udoc=await getDoc(doc(db,"users",other));
      if(!udoc.exists()) continue;

      let u=udoc.data();

      let lastMsg="";
      let msgs=await getDocs(query(collection(db,"chats",id,"messages"),orderBy("time","desc")));

      msgs.forEach(m=>{
        if(!lastMsg){
          let data=m.data();
          lastMsg=data.text || "media";
        }
      });

      let div=document.createElement("div");
      div.className="chatItem";
      div.innerHTML=`
        <div class="name">${u.name}</div>
        <div class="last">${lastMsg}</div>
      `;
      div.onclick=()=>openChat(u);

      chatList.appendChild(div);
    }
  });
}

// SEARCH
searchBtn.onclick=()=>show("searchScreen");
backBtn.onclick=()=>show("homeScreen");

searchInput.onkeyup=async()=>{
  let term=searchInput.value.toLowerCase();
  userList.innerHTML="";
  if(!term)return;

  let snap=await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    let u=d.data();
    if(u.uid===ME.uid)return;

    if(u.name.includes(term)){
      let div=document.createElement("div");
      div.className="chatItem";
      div.innerText=u.name;
      div.onclick=()=>openChat(u);
      userList.appendChild(div);
    }
  });
};

// CHAT
function openChat(u){
  currentChat=[ME.uid,u.uid].sort().join("_");
  chatName.innerText=u.name;
  show("chatScreen");

  if(unsub)unsub();

  unsub=onSnapshot(query(collection(db,"chats",currentChat,"messages"),orderBy("time")),snap=>{
    messages.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();

      let div=document.createElement("div");
      div.className="msg "+(m.uid===ME.uid?"me":"other");
      div.innerText=m.text;

      messages.appendChild(div);
    });

    messages.scrollTop=messages.scrollHeight;
  });
}

// SEND
sendBtn.onclick = async()=>{
  if(!msg.value || !currentChat){
    alert("Select user first");
    return;
  }

  await setDoc(doc(db,"chats",currentChat),{
    users: currentChat.split("_")
  },{merge:true});

  await addDoc(collection(db,"chats",currentChat,"messages"),{
    text:msg.value,
    uid:ME.uid,
    time:Date.now()
  });

  msg.value="";
};

// NAV
backBtn2.onclick=()=>show("homeScreen");
logoutBtn.onclick=()=>signOut(auth);

</script>
</body>
</html>
