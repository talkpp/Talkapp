<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif}

/* LOGIN */
#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#loginBox{background:#fff;padding:20px;border-radius:10px;width:300px}

/* SCREENS */
.screen{display:none;height:100vh;flex-direction:column}
.active{display:flex}

/* SEARCH SCREEN */
#searchHeader{background:#075E54;color:#fff;padding:15px;font-size:18px}
#searchInput{margin:10px;padding:10px;border-radius:20px;border:1px solid #ccc}
.user{padding:15px;border-bottom:1px solid #ddd;cursor:pointer}

/* CHAT */
#chatHeader{background:#075E54;color:#fff;padding:10px;display:flex;align-items:center;gap:10px}
#backBtn{cursor:pointer}
#messages{flex:1;padding:10px;overflow:auto;background:#ece5dd}

.msg{margin:5px;padding:10px;border-radius:10px;max-width:60%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

#input{display:flex;padding:10px;background:#fff}
#input input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username"><br><br>
    <input id="p" type="password" placeholder="Password"><br><br>
    <button onclick="handleAuth()">Login</button>
  </div>
</div>

<!-- SEARCH SCREEN -->
<div id="searchScreen" class="screen">
  <div id="searchHeader">Search User</div>
  <input id="searchInput" placeholder="Search..." onkeyup="searchUsers()">
  <div id="userList"></div>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" class="screen">
  <div id="chatHeader">
    <span id="backBtn" onclick="goBack()">⬅</span>
    <span id="chatName"></span>
  </div>

  <div id="messages"></div>

  <div id="input">
    <input id="msg" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null,currentChat=null,currentUser=null,unsub=null;

// LOGIN
async function handleAuth(){
  let u=uEl().value.trim().toLowerCase();
  let p=pEl().value;

  if(u.length<3||p.length<6)return alert("Invalid");

  let email=u+"@app.com";

  try{
    let snap=await db.collection("users").where("name","==",u).get();

    if(snap.empty){
      let cred=await auth.createUserWithEmailAndPassword(email,p);
      await db.collection("users").doc(cred.user.uid).set({
        name:u,uid:cred.user.uid
      });
    }else{
      await auth.signInWithEmailAndPassword(email,p);
    }
  }catch(e){
    alert(e.message);
  }
}

function uEl(){return document.getElementById("u")}
function pEl(){return document.getElementById("p")}

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    ME=user;
    document.getElementById("login").style.display="none";
    showScreen("searchScreen");
  }
});

// SCREEN SWITCH
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// SEARCH USERS
function searchUsers(){
  let term=document.getElementById("searchInput").value.toLowerCase();
  let box=document.getElementById("userList");

  if(term.length<1){
    box.innerHTML="";
    return;
  }

  db.collection("users").get().then(snap=>{
    box.innerHTML="";
    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid)return;

      if(u.name.includes(term)){
        let div=document.createElement("div");
        div.className="user";
        div.innerText=u.name;
        div.onclick=()=>openChat(u);
        box.appendChild(div);
      }
    });
  });
}

// OPEN CHAT (FULL SCREEN)
function openChat(u){
  currentUser=u;
  currentChat=[ME.uid,u.uid].sort().join("_");

  document.getElementById("chatName").innerText=u.name;

  showScreen("chatScreen");

  if(unsub)unsub();

  unsub=db.collection("chats").doc(currentChat)
  .collection("messages").orderBy("time")
  .onSnapshot(snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();
      let div=document.createElement("div");
      div.className="msg "+(m.uid===ME.uid?"me":"other");
      div.innerText=m.text;
      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

// BACK BUTTON
function goBack(){
  showScreen("searchScreen");
}

// SEND
async function sendMessage(){
  let text=document.getElementById("msg").value.trim();
  if(!text||!currentChat)return;

  await db.collection("chats").doc(currentChat)
  .collection("messages").add({
    text:text,
    uid:ME.uid,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("msg").value="";
}
</script>

</body>
  </html>
