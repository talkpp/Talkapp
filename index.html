<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:white}
#app{display:flex;height:100vh}

#sidebar{width:30%;background:#111b21;overflow-y:auto}
.header{padding:15px;background:#202c33}
.user{padding:15px;border-bottom:1px solid #222;cursor:pointer}
.user:hover{background:#202c33}

#chatBox{width:70%;display:flex;flex-direction:column}
#chatHeader{padding:15px;background:#202c33}
#messages{flex:1;overflow-y:auto;padding:15px}

.msg{margin:8px 0;padding:10px;border-radius:8px;max-width:60%}
.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

#inputBox{display:flex;padding:10px;background:#202c33}
#inputBox input{flex:1;padding:10px;border:none;border-radius:8px}
#inputBox button{margin-left:10px;padding:10px;border:none;border-radius:8px;background:#00a884;color:white}
</style>
</head>

<body>

<div id="login" style="padding:20px">
  <h2>TalkZone</h2>
  <input id="u" placeholder="Username"><br><br>
  <input id="p" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login / Signup</button>
</div>

<div id="app" style="display:none">

  <div id="sidebar">
    <div class="header">Users</div>
    <div id="users"></div>
  </div>

  <div id="chatBox">
    <div id="chatHeader">Select user</div>
    <div id="messages"></div>

    <div id="inputBox">
      <input id="msgInput" placeholder="Type message...">
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<!-- ✅ MODULAR FIREBASE SDK -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ✅ YOUR CONFIG ADDED
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  databaseURL: "https://talkzone-b3488-default-rtdb.firebaseio.com",
  projectId: "talkzone-b3488",
  storageBucket: "talkzone-b3488.firebasestorage.app",
  messagingSenderId: "526945974843",
  appId: "1:526945974843:web:997fb419c944ae9c1fba1e",
  measurementId: "G-YYT58TN5CB"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let ME=null;
let currentChat=null;
let unsubscribe=null;

// LOGIN
window.login = async function(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(!u || u.length<3){
    alert("Username 3+ required"); return;
  }
  if(!p || p.length<6){
    alert("Password 6+ required"); return;
  }

  let email=u+"@chat.com";

  try{
    await signInWithEmailAndPassword(auth,email,p);
  }catch{
    let cred=await createUserWithEmailAndPassword(auth,email,p);

    await setDoc(doc(db,"users",cred.user.uid),{
      name:u,
      uid:cred.user.uid
    });
  }
}

// AUTH
onAuthStateChanged(auth,user=>{
  if(user){
    ME=user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    loadUsers();
  }
});

// LOAD USERS
function loadUsers(){
  onSnapshot(collection(db,"users"),snap=>{
    let box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;

      let div=document.createElement("div");
      div.className="user";
      div.innerText=u.name;

      div.onclick=()=>openChat(u);

      box.appendChild(div);
    });
  });
}

// OPEN CHAT
function openChat(user){
  currentChat=[ME.uid,user.uid].sort().join("_");
  document.getElementById("chatHeader").innerText=user.name;

  if(unsubscribe) unsubscribe();

  const q = query(
    collection(db,"chats",currentChat,"messages"),
    orderBy("time")
  );

  unsubscribe = onSnapshot(q,snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();

      let div=document.createElement("div");
      div.className="msg " + (m.uid===ME.uid?"me":"other");
      div.innerText=m.text;

      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

// SEND
window.send = async function(){
  let text=document.getElementById("msgInput").value;
  if(!text || !currentChat) return;

  await addDoc(collection(db,"chats",currentChat,"messages"),{
    text:text,
    uid:ME.uid,
    time:Date.now()
  });

  document.getElementById("msgInput").value="";
}

</script>

</body>
</html>
