<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone - Chat App</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #fff;
  color: #111;
}

/* ===== LOGIN PAGE ===== */
#login {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.login-container {
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  width: 100%;
  max-width: 400px;
}

.login-container h2 {
  text-align: center;
  margin-bottom: 30px;
  color: #667eea;
  font-size: 28px;
}

.login-container input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  transition: border-color 0.3s;
}

.login-container input:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.login-container button {
  width: 100%;
  padding: 12px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s;
}

.login-container button:hover {
  background: #5568d3;
}

/* ===== MAIN APP ===== */
#app {
  display: flex;
  height: 100vh;
  background: #fff;
}

/* LEFT SIDEBAR */
#sidebar {
  width: 30%;
  background: #fff;
  border-right: 1px solid #e5e5e5;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px 20px;
  background: #f5f5f5;
  border-bottom: 1px solid #e5e5e5;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sidebar-header h1 {
  font-size: 32px;
  color: #667eea;
}

.header-icons {
  display: flex;
  gap: 10px;
}

.icon-btn {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: #667eea;
}

.search-box {
  padding: 10px 20px;
  background: #f5f5f5;
}

.search-box input {
  width: 100%;
  padding: 10px 15px;
  border: 1px solid #e5e5e5;
  border-radius: 20px;
  background: white;
  font-size: 14px;
}

.search-box input:focus {
  outline: none;
  border-color: #667eea;
}

#users {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.user {
  padding: 12px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.2s;
  border-bottom: 1px solid #f5f5f5;
}

.user:hover {
  background: #f5f5f5;
}

.user.active {
  background: #e8e8ff;
}

.user-avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  font-size: 18px;
  position: relative;
  flex-shrink: 0;
}

.user-avatar.online::after {
  content: '';
  position: absolute;
  bottom: 0;
  right: 0;
  width: 14px;
  height: 14px;
  background: #31a24c;
  border: 3px solid white;
  border-radius: 50%;
}

.user-info {
  flex: 1;
  min-width: 0;
}

.user-name {
  font-weight: 500;
  color: #111;
  font-size: 15px;
}

.user-status {
  font-size: 13px;
  color: #888;
  margin-top: 4px;
}

/* RIGHT CHAT BOX */
#chatBox {
  width: 70%;
  display: flex;
  flex-direction: column;
  background: #fff;
}

#chatHeader {
  padding: 12px 20px;
  background: #f5f5f5;
  border-bottom: 1px solid #e5e5e5;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chat-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.chat-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
}

.chat-details h3 {
  margin: 0;
  font-size: 15px;
  color: #111;
}

.chat-status {
  font-size: 12px;
  color: #888;
  margin-top: 2px;
}

.chat-icons {
  display: flex;
  gap: 15px;
}

.chat-icons button {
  background: none;
  border: none;
  font-size: 20px;
  cursor: pointer;
  color: #667eea;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  background: #fff;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg-group {
  display: flex;
  margin-bottom: 8px;
  gap: 8px;
}

.msg-group.me {
  justify-content: flex-end;
}

.msg {
  max-width: 55%;
  padding: 10px 14px;
  border-radius: 18px;
  word-wrap: break-word;
  font-size: 14px;
  line-height: 1.4;
  position: relative;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.msg.me {
  background: #dcf8c6;
  color: #111;
  border-bottom-right-radius: 4px;
}

.msg.other {
  background: #e5e5ea;
  color: #111;
  border-bottom-left-radius: 4px;
}

.msg-time {
  font-size: 12px;
  color: #888;
  margin-top: 4px;
}

.msg-receipt {
  display: inline-block;
  margin-left: 4px;
  font-size: 12px;
  color: #31a24c;
}

/* INPUT BOX */
#inputBox {
  display: flex;
  padding: 16px 20px;
  background: #fff;
  border-top: 1px solid #e5e5e5;
  gap: 10px;
  align-items: flex-end;
}

#inputBox button {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: #667eea;
}

#msgInput {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid #e5e5e5;
  border-radius: 20px;
  font-size: 14px;
  resize: none;
  max-height: 100px;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  transition: border-color 0.3s;
}

#msgInput:focus {
  outline: none;
  border-color: #667eea;
}

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 10px 14px;
  background: #e5e5ea;
  border-radius: 18px;
  width: fit-content;
  margin: 8px 0;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #888;
  animation: bounce 1.4s infinite;
}

.dot:nth-child(2) {
  animation-delay: 0.2s;
}

.dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-10px); }
}

/* NO CHAT SELECTED */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #888;
}

.empty-state h2 {
  font-size: 28px;
  margin-bottom: 10px;
}

/* SCROLLBAR */
::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: #999;
}

@media (max-width: 768px) {
  #sidebar { width: 100%; }
  #chatBox { display: none; }
  #chatBox.active { display: flex; width: 100%; }
  #app { flex-direction: column; }
}
</style>
</head>

<body>

<div id="login" style="padding:20px">
  <div class="login-container">
    <h2>💬 TalkZone</h2>
    <input id="u" placeholder="Username (3+ chars)"><br>
    <input id="p" type="password" placeholder="Password (6+ chars)"><br>
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<div id="app" style="display:none">

  <div id="sidebar">
    <div class="sidebar-header">
      <h1>💬</h1>
      <div class="header-icons">
        <button class="icon-btn">⋯</button>
      </div>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search...">
    </div>

    <div id="users"></div>
  </div>

  <div id="chatBox">
    <div id="chatHeader">
      <div class="chat-info">
        <div class="chat-avatar" id="chatAvatar">T</div>
        <div>
          <h3 id="chatName">Select a chat</h3>
          <div class="chat-status" id="chatStatus">offline</div>
        </div>
      </div>
      <div class="chat-icons">
        <button>📱</button>
        <button>📹</button>
        <button>⋯</button>
      </div>
    </div>

    <div id="messages">
      <div class="empty-state">
        <h2>💬</h2>
        <p>Select a chat to start messaging</p>
      </div>
    </div>

    <div id="inputBox">
      <button onclick="toggleEmoji()">😀</button>
      <textarea id="msgInput" placeholder="Type a message..." rows="1"></textarea>
      <button onclick="send()">📤</button>
    </div>
  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let ME = null;
let currentChat = null;
let unsubscribe = null;
let usersData = {};

// LOGIN
function login(){
  let u = document.getElementById("u").value.trim().toLowerCase();
  let p = document.getElementById("p").value;

  if(!u || u.length < 3){
    alert("Username must be 3+ characters");
    return;
  }

  if(!p || p.length < 6){
    alert("Password must be 6+ characters");
    return;
  }

  let email = u + "@talkzone.com";

  auth.signInWithEmailAndPassword(email, p)
  .catch(async () => {
    let cred = await auth.createUserWithEmailAndPassword(email, p);
    
    await db.collection("users").doc(cred.user.uid).set({
      name: u,
      uid: cred.user.uid,
      online: true,
      lastSeen: new Date(),
      avatar: u.charAt(0).toUpperCase()
    });
  });
}

// AUTH
auth.onAuthStateChanged(user => {
  if(user){
    ME = user;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
    
    // Set user online
    db.collection("users").doc(user.uid).update({
      online: true,
      lastSeen: new Date()
    });
    
    loadUsers();

    // Set user offline on logout
    window.addEventListener("beforeunload", () => {
      db.collection("users").doc(user.uid).update({ online: false });
    });
  }
});

// LOAD USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap => {
    let box = document.getElementById("users");
    box.innerHTML = "";
    usersData = {};

    snap.forEach(d => {
      let u = d.data();
      usersData[u.uid] = u;

      if(u.uid === ME.uid) return;

      let div = document.createElement("div");
      div.className = "user" + (currentChat && currentChat.includes(u.uid) ? " active" : "");
      div.onclick = () => openChat(u);

      let avatar = document.createElement("div");
      avatar.className = "user-avatar" + (u.online ? " online" : "");
      avatar.innerText = u.avatar || u.name.charAt(0).toUpperCase();

      let info = document.createElement("div");
      info.className = "user-info";

      let name = document.createElement("div");
      name.className = "user-name";
      name.innerText = u.name;

      let status = document.createElement("div");
      status.className = "user-status";
      status.innerText = u.online ? "Online" : "Last seen " + formatTime(u.lastSeen);

      info.appendChild(name);
      info.appendChild(status);
      div.appendChild(avatar);
      div.appendChild(info);
      box.appendChild(div);
    });
  });
}

// OPEN CHAT
function openChat(user){
  currentChat = [ME.uid, user.uid].sort().join("_");

  document.getElementById("chatName").innerText = user.name;
  document.getElementById("chatStatus").innerText = user.online ? "Online" : "Last seen " + formatTime(user.lastSeen);
  document.getElementById("chatAvatar").innerText = user.avatar || user.name.charAt(0).toUpperCase();

  // Update active state
  document.querySelectorAll(".user").forEach(u => u.classList.remove("active"));
  document.querySelectorAll(".user").forEach(u => {
    if(u.innerText.includes(user.name)) u.classList.add("active");
  });

  if(unsubscribe) unsubscribe();

  unsubscribe = db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap => {
      let box = document.getElementById("messages");
      box.innerHTML = "";

      snap.forEach(d => {
        let m = d.data();
        let isMe = m.uid === ME.uid;

        let group = document.createElement("div");
        group.className = "msg-group" + (isMe ? " me" : "");

        let div = document.createElement("div");
        div.className = "msg" + (isMe ? " me" : " other");

        let text = document.createElement("div");
        text.innerText = m.text;

        let time = document.createElement("div");
        time.className = "msg-time";
        time.innerText = formatTime(m.time.toDate ? m.time.toDate() : new Date(m.time));

        if(isMe && m.read) {
          time.innerHTML += '<span class="msg-receipt">✓✓</span>';
        } else if(isMe) {
          time.innerHTML += '<span class="msg-receipt">✓</span>';
        }

        div.appendChild(text);
        div.appendChild(time);
        group.appendChild(div);
        box.appendChild(group);
      });

      box.scrollTop = box.scrollHeight;
    });
}

// SEND MESSAGE
function send(){
  let text = document.getElementById("msgInput").value.trim();
  if(!text || !currentChat) return;

  db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .add({
      text: text,
      uid: ME.uid,
      time: new Date(),
      read: false
    });

  document.getElementById("msgInput").value = "";
  document.getElementById("msgInput").style.height = "auto";
}

// AUTO-RESIZE TEXTAREA
document.addEventListener("DOMContentLoaded", () => {
  const textarea = document.getElementById("msgInput");
  textarea.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
  });

  textarea.addEventListener("keypress", (e) => {
    if(e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
});

// TOGGLE EMOJI (placeholder)
function toggleEmoji(){
  alert("Emoji picker coming soon! 😊");
}

// FORMAT TIME
function formatTime(date){
  if(!date) return "";
  let now = new Date();
  let diff = now - date;
  let mins = Math.floor(diff / 60000);
  let hours = Math.floor(diff / 3600000);
  let days = Math.floor(diff / 86400000);

  if(mins < 1) return "just now";
  if(mins < 60) return mins + "m ago";
  if(hours < 24) return hours + "h ago";
  if(days < 7) return days + "d ago";
  return date.toLocaleDateString();
}

</script>

</body>
</html>
