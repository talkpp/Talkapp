<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
    body{margin:0;font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#333;overflow:hidden;height:100vh;}
    #login{display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);}
    #loginBox{background:#fff;padding:30px;border-radius:16px;width:320px;box-shadow:0 10px 30px rgba(0,0,0,0.2);text-align:center;}
    #login h2{margin:0 0 20px;color:#667eea;font-size:28px;}
    #login input{width:100%;padding:14px;margin:10px 0;border:1px solid #ddd;border-radius:8px;font-size:16px;}
    #login button{width:100%;padding:14px;background:#667eea;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:600;}
    #loginError{color:#d32f2f;margin-top:10px;}

    #app{display:none;height:100vh;flex-direction:column;}
    #header{background:#667eea;color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
    #main{display:flex;flex:1;overflow:hidden;}
    #sidebar{width:320px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;}
    #searchBox{padding:15px;background:#f8f9fa;border-bottom:1px solid #ddd;}
    #searchInput{width:100%;padding:12px 20px;border:1px solid #ddd;border-radius:25px;outline:none;}
    #usersList{flex:1;overflow:auto;}
    .user{padding:14px 20px;border-bottom:1px solid #eee;cursor:pointer;display:flex;align-items:center;gap:12px;}
    .user:hover{background:#f0f2f5;}
    .avatar{width:48px;height:48px;background:#667eea;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:20px;}
    .username{font-weight:600;}

    #chatArea{flex:1;display:flex;flex-direction:column;background:#f0f2f5;position:relative;}
    #chatHeader{padding:15px 20px;background:white;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:12px;display:none;}
    #chatWith{font-weight:600;font-size:18px;}
    #messages{flex:1;padding:20px 20px 100px;overflow:auto;display:flex;flex-direction:column;gap:12px;}
    .msg{max-width:75%;padding:12px 16px;border-radius:18px;}
    .me{background:#dcf8c6;align-self:flex-end;}
    .other{background:#fff;align-self:flex-start;}
    #inputArea{position:absolute;bottom:0;left:0;right:0;background:white;padding:12px 16px;border-top:1px solid #ddd;display:flex;gap:10px;display:none;}
    #inputArea input{flex:1;padding:14px;border:1px solid #ddd;border-radius:30px;outline:none;}
    #inputArea button{padding:0 24px;background:#667eea;color:white;border:none;border-radius:30px;cursor:pointer;}
</style>
</head>
<body>

<div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="handleAuth()">Login / Sign Up</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="app">
  <div id="header">
    <h1>TalkZone</h1>
    <div id="userInfo"></div>
    <button onclick="showBlockedModal()">Blocked</button>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="searchBox"><input id="searchInput" placeholder="Search users..." onkeyup="filterUsers()"></div>
      <div id="usersList"></div>
    </div>
    <div id="chatArea">
      <div id="chatHeader">
        <div class="avatar" id="chatAvatar"></div>
        <div id="chatWith" style="flex:1"></div>
        <button id="blockBtn" onclick="toggleBlock()">Block</button>
      </div>
      <div id="messages"></div>
      <div id="inputArea">
        <input id="msgInput" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME = null;
let currentChatId = null;
let currentChatUser = null;
let unsubMessages = null;
let unsubUsers = null;

async function handleAuth() {
  const u = document.getElementById("u").value.trim().toLowerCase();
  const p = document.getElementById("p").value;
  const err = document.getElementById("loginError");
  err.innerText = "";

  if (u.length < 3 || p.length < 6) {
    err.innerText = "Username min 3, Password min 6";
    return;
  }

  const email = u + "@talkzone.app";
  try {
    await auth.signInWithEmailAndPassword(email, p);
  } catch (e) {
    if (e.code === "auth/user-not-found" || e.code.includes("invalid")) {
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, p);
        await db.collection("users").doc(cred.user.uid).set({name: u, uid: cred.user.uid});
        await db.collection("usernames").doc(u).set({uid: cred.user.uid, reserved: true});
      } catch (err2) {
        err.innerText = "Signup error: " + err2.message;
      }
    } else {
      err.innerText = "Login failed: " + e.message;
    }
  }
}

auth.onAuthStateChanged(user => {
  if (user) {
    ME = user;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";
    document.getElementById("userInfo").innerText = "Logged in as: " + (ME.email ? ME.email.split('@')[0] : "User");
    console.log("✅ Logged in successfully as:", ME.uid);
    loadAllUsers();
  } else {
    document.getElementById("login").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

function loadAllUsers() {
  console.log("Loading users list...");
  if (unsubUsers) unsubUsers();
  unsubUsers = db.collection("users").onSnapshot(snap => {
    console.log("Users snapshot received, count:", snap.size);
    const box = document.getElementById("usersList");
    box.innerHTML = "";
    snap.forEach(doc => {
      const u = doc.data();
      if (u.uid === ME.uid) return;
      const div = document.createElement("div");
      div.className = "user";
      div.innerHTML = `<div class="avatar">\( {u.name[0].toUpperCase()}</div><div><div class="username"> \){u.name}</div><div>Tap to chat</div></div>`;
      div.onclick = () => openChat(u);
      box.appendChild(div);
    });
  }, error => {
    console.error("❌ Users load error:", error);
  });
}

function openChat(user) {
  console.log("Opening chat with:", user.name, "UID:", user.uid);
  currentChatUser = user;
  currentChatId = [ME.uid, user.uid].sort().join("_");
  console.log("Chat ID:", currentChatId);

  document.getElementById("chatHeader").style.display = "flex";
  document.getElementById("chatAvatar").innerText = user.name[0].toUpperCase();
  document.getElementById("chatWith").innerText = user.name;
  document.getElementById("inputArea").style.display = "flex";

  if (unsubMessages) unsubMessages();

  unsubMessages = db.collection("chats").doc(currentChatId)
    .collection("messages")
    .orderBy("time", "asc")
    .onSnapshot(snap => {
      console.log("Messages snapshot received:", snap.size);
      const box = document.getElementById("messages");
      box.innerHTML = "";
      snap.forEach(d => {
        const m = d.data();
        const div = document.createElement("div");
        div.className = `msg ${m.uid === ME.uid ? "me" : "other"}`;
        div.innerHTML = m.text + "<br><small>" + (m.time ? m.time.toDate().toLocaleTimeString() : '') + "</small>";
        box.appendChild(div);
      });
      box.scrollTop = box.scrollHeight;
    }, error => {
      console.error("❌ Messages listener error:", error.code, error.message);
    });
}

async function sendMessage() {
  const text = document.getElementById("msgInput").value.trim();
  if (!text || !currentChatId) return;
  console.log("Sending message:", text);
  await db.collection("chats").doc(currentChatId).collection("messages").add({
    text: text,
    uid: ME.uid,
    time: firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById("msgInput").value = "";
}

// Other functions (block, delete etc.) can be added later if needed

</script>
</body>
</html>
