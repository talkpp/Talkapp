<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script><style>
body{margin:0;font-family:sans-serif;background:#f0f2f5;height:100vh}

/* PREMIUM LOGIN */
#login{
display:flex;justify-content:center;align-items:center;height:100vh;
background:linear-gradient(135deg,#667eea,#764ba2);
}
#loginBox{
background:#fff;padding:30px;border-radius:16px;width:320px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);text-align:center;
}
#loginBox h2{margin-bottom:20px}
#loginBox input{
width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ddd
}
#loginBox button{
width:100%;padding:12px;background:#667eea;color:#fff;border:none;
border-radius:8px;font-weight:bold;cursor:pointer
}

/* APP */
#app{display:none;height:100vh;display:flex}
#sidebar{width:30%;background:#fff;overflow:auto}
.user{padding:12px;border-bottom:1px solid #ddd;cursor:pointer}

#chat{flex:1;display:flex;flex-direction:column}
#chatHeader{background:#075E54;color:#fff;padding:10px;display:flex;justify-content:space-between}
#messages{flex:1;padding:10px;overflow:auto}

.msg{margin:5px;padding:10px;border-radius:10px;max-width:60%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

.tick{font-size:10px;margin-left:5px;color:gray}
.seen{color:blue}

#typing{font-size:12px;color:gray;padding-left:10px}
#replyBox{background:#eee;padding:5px;display:none}

#input{display:flex;padding:10px}
#input input{flex:1;padding:10px}
</style></head><body><div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="handleAuth()">Login / Signup</button>
  </div>
</div><div id="app">
  <div id="sidebar"></div>  <div id="chat">
    <div id="chatHeader">
      <span id="chatName">Select user</span>
      <span id="chatStatus"></span>
      <button onclick="toggleBlock()">Block</button>
    </div><div id="messages"></div>
<div id="typing"></div>
<div id="replyBox"></div>

<div id="input">
  <input id="msg" oninput="typingNow()" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>

  </div>
</div><script>
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null,currentChat=null,currentUser=null,unsub=null;
let myData=null,replyMsg=null;

// LOGIN SAME
async function handleAuth(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;
  if(u.length<3||p.length<6)return alert("Invalid");

  let email=u+"@app.com";

  try{
    let snap=await db.collection("users").where("name","==",u).get();

    if(snap.empty){
      let cred=await auth.createUserWithEmailAndPassword(email,p);
      await db.collection("users").doc(cred.user.uid).set({
        name:u,uid:cred.user.uid,blocked:[],lastSeen:Date.now()
      });
    }else{
      await auth.signInWithEmailAndPassword(email,p);
    }
  }catch(e){
    if(e.code==="auth/wrong-password") alert("Wrong password");
    else alert(e.message);
  }
}

// AUTH
auth.onAuthStateChanged(async user=>{
  if(user){
    ME=user;
    let doc=await db.collection("users").doc(user.uid).get();
    myData=doc.data();

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    loadChats();

    window.onbeforeunload=()=>{
      db.collection("users").doc(ME.uid).update({lastSeen:Date.now()});
    };

  }else{
    document.getElementById("login").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

// ✅ CHAT LIST ONLY (FIXED ISSUE)
function loadChats(){
  db.collection("chats")
  .where("users","array-contains",ME.uid)
  .onSnapshot(async snap=>{
    let box=document.getElementById("sidebar");
    box.innerHTML="";

    for(const doc of snap.docs){
      let chat=doc.data();
      let otherId=chat.users.find(x=>x!==ME.uid);

      let userDoc=await db.collection("users").doc(otherId).get();
      let u=userDoc.data();

      let div=document.createElement("div");
      div.className="user";
      div.innerHTML=`<b>${u.name}</b><br><small>${chat.lastMessage||""}</small>`;
      div.onclick=()=>openChat(u);
      box.appendChild(div);
    }
  });
}

// ✅ LAST SEEN FIX
function formatLastSeen(ts){
  let diff=Math.floor((Date.now()-ts)/1000);

  if(diff<10) return "online";
  if(diff<60) return "last seen just now";

  let m=Math.floor(diff/60);
  if(m<60) return "last seen "+m+" min ago";

  let h=Math.floor(m/60);
  if(h<24) return "last seen "+h+" hr ago";

  let d=Math.floor(h/24);
  return "last seen "+d+" day ago";
}

// CHAT
function openChat(u){
  if(myData.blocked?.includes(u.uid)) return alert("Blocked");

  currentUser=u;
  document.getElementById("chatName").innerText=u.name;
  currentChat=[ME.uid,u.uid].sort().join("_");

  db.collection("users").doc(u.uid).onSnapshot(d=>{
    document.getElementById("chatStatus").innerText=
      formatLastSeen(d.data().lastSeen||0);
  });

  if(unsub)unsub();

  unsub=db.collection("chats").doc(currentChat)
  .collection("messages").orderBy("time")
  .onSnapshot(snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(doc=>{
      let m=doc.data();
      let div=document.createElement("div");
      div.className="msg "+(m.uid===ME.uid?"me":"other");

      let tick=m.uid===ME.uid?(m.seen?"✔✔":"✔"):"";

      div.innerHTML=(m.reply?"<small>↩ "+m.reply+"</small><br>":"")+
      (m.deleted?"<i>deleted</i>":m.text)+
      " <span class='tick "+(m.seen?"seen":"")+"'>"+tick+"</span>";

      if(m.uid!==ME.uid&&!m.seen) doc.ref.update({seen:true});

      div.onclick=()=>{
        replyMsg=m.text;
        document.getElementById("replyBox").style.display="block";
        document.getElementById("replyBox").innerText="Replying: "+m.text;
      };

      div.oncontextmenu=(e)=>{
        e.preventDefault();
        if(m.uid===ME.uid) doc.ref.update({deleted:true});
      };

      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

// SEND
async function sendMessage(){
  let input=document.getElementById("msg");
  let text=input.value.trim();
  if(!text||!currentChat)return;

  await db.collection("chats").doc(currentChat).set({
    users:[ME.uid,currentUser.uid],
    lastMessage:text,
    lastTime:Date.now()
  },{merge:true});

  await db.collection("chats").doc(currentChat)
  .collection("messages").add({
    text:text,uid:ME.uid,seen:false,deleted:false,
    reply:replyMsg||null,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });

  replyMsg=null;
  document.getElementById("replyBox").style.display="none";
  input.value="";
}

// typing
function typingNow(){
  if(!currentChat)return;
  db.collection("typing").doc(currentChat).set({uid:ME.uid});
  setTimeout(()=>db.collection("typing").doc(currentChat).delete(),1000);
}

// block
async function toggleBlock(){
  let ref=db.collection("users").doc(ME.uid);
  let arr=myData.blocked||[];

  if(arr.includes(currentUser.uid)){
    arr=arr.filter(x=>x!==currentUser.uid);
  }else{
    arr.push(currentUser.uid);
  }

  myData.blocked=arr;
  await ref.update({blocked:arr});
}
</script></body>
</html>
