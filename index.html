<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b141a;color:white}
#login{display:flex;height:100vh;justify-content:center;align-items:center}
#box{background:#202c33;padding:20px;border-radius:10px;width:300px}
input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:6px}
button{padding:10px;width:100%;background:#00a884;color:white;border:none;border-radius:6px}

#app{display:none;height:100vh;display:flex}

#sidebar{width:30%;background:#111b21;overflow:auto}
.user{padding:15px;border-bottom:1px solid #222;cursor:pointer}
.user:hover{background:#202c33}
.name{font-weight:bold}
.status{font-size:12px;color:#8696a0}

#chat{flex:1;display:flex;flex-direction:column}
#top{padding:10px;background:#202c33;display:flex;justify-content:space-between}
#messages{flex:1;padding:10px;overflow:auto}
.msg{margin:5px 0;padding:8px;border-radius:10px;max-width:60%}
.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

#input{display:flex;padding:10px;background:#202c33}
#input input{flex:1}
</style>
</head>

<body>

<div id="login">
  <div id="box">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<div id="app">
  <div id="sidebar"></div>

  <div id="chat">
    <div id="top">
      <span id="chatName">Select user</span>
      <button onclick="blockUser()" style="width:auto">Block</button>
    </div>

    <div id="messages"></div>

    <div id="input">
      <input id="msg" placeholder="Message">
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let currentUID=null;
let currentChat=null;
let blocked=[];

// LOGIN / SIGNUP
async function login(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(u.length<3 || p.length<6){
    alert("Invalid input");
    return;
  }

  let email=u+"@app.com";

  try{
    await auth.signInWithEmailAndPassword(email,p);
  }catch(e){
    let res=await auth.createUserWithEmailAndPassword(email,p);

    await db.collection("users").doc(res.user.uid).set({
      name:u,
      uid:res.user.uid,
      lastSeen:Date.now(),
      online:true,
      blocked:[]
    });
  }
}

// AUTH STATE
auth.onAuthStateChanged(async user=>{
  if(user){
    ME=user;

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";

    loadMe();
    loadUsers();
    updateOnline();
  }
});

// ONLINE / OFFLINE
window.onfocus=()=>updateOnline();
window.onblur=()=>updateOffline();

function updateOnline(){
  db.collection("users").doc(ME.uid).update({
    online:true,
    lastSeen:Date.now()
  });
}

function updateOffline(){
  db.collection("users").doc(ME.uid).update({
    online:false,
    lastSeen:Date.now()
  });
}

// LOAD SELF
async function loadMe(){
  let d=await db.collection("users").doc(ME.uid).get();
  blocked=d.data().blocked || [];
}

// LAST SEEN FORMAT
function getStatus(u){
  if(u.online) return "Online";

  let diff=Date.now()-u.lastSeen;
  if(diff<60000) return "Last seen just now";

  let min=Math.floor(diff/60000);
  return "Last seen "+min+" min ago";
}

// LOAD USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let box=document.getElementById("sidebar");
    box.innerHTML="";

    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;
      if(blocked.includes(u.uid)) return;

      let div=document.createElement("div");
      div.className="user";
      div.innerHTML=`
        <div class="name">${u.name}</div>
        <div class="status">${getStatus(u)}</div>
      `;
      div.onclick=()=>openChat(u);
      box.appendChild(div);
    });
  });
}

// OPEN CHAT
function openChat(user){
  currentUID=user.uid;
  currentChat=[ME.uid,user.uid].sort().join("_");

  document.getElementById("chatName").innerText=user.name;

  db.collection("chats")
  .doc(currentChat)
  .onSnapshot(doc=>{
    let typing=doc.data()?.typing;

    if(typing && typing!==ME.uid){
      document.getElementById("chatName").innerText="Typing...";
    }else{
      document.getElementById("chatName").innerText=user.name;
    }
  });

  db.collection("chats")
  .doc(currentChat)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    let box=document.getElementById("messages");
    box.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();

      if(m.uid!==ME.uid && !m.seen){
        d.ref.update({seen:true});
      }

      let div=document.createElement("div");
      div.className="msg "+(m.uid===ME.uid?"me":"other");

      let tick="";
      if(m.uid===ME.uid){
        tick = m.seen ? " ✔✔" : " ✔";
      }

      div.innerText=m.text+tick;
      box.appendChild(div);
    });

    box.scrollTop=box.scrollHeight;
  });
}

// TYPING
document.getElementById("msg").addEventListener("input", ()=>{
  if(!currentChat) return;

  db.collection("chats").doc(currentChat).set({
    typing:ME.uid
  },{merge:true});

  setTimeout(()=>{
    db.collection("chats").doc(currentChat).update({
      typing:""
    });
  },1500);
});

// SEND MESSAGE
async function send(){
  let text=document.getElementById("msg").value.trim();
  if(!text || !currentChat) return;

  if(blocked.includes(currentUID)){
    alert("You blocked this user");
    return;
  }

  let other=await db.collection("users").doc(currentUID).get();
  if(other.data().blocked?.includes(ME.uid)){
    alert("You are blocked");
    return;
  }

  await db.collection("chats")
  .doc(currentChat)
  .collection("messages")
  .add({
    text:text,
    uid:ME.uid,
    seen:false,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });

  document.getElementById("msg").value="";
}

// BLOCK USER
async function blockUser(){
  if(!currentUID) return;

  blocked.push(currentUID);

  await db.collection("users").doc(ME.uid).update({
    blocked:blocked
  });

  alert("User Blocked");
  loadUsers();
}
</script>

</body>
  </html>
