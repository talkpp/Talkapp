<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:white}
#login{display:flex;justify-content:center;align-items:center;height:100vh}
#loginBox{background:#202c33;padding:20px;border-radius:10px;width:300px}
#login input{width:100%;padding:10px;margin:8px 0;background:#111;border:none;color:white}
#login button{width:100%;padding:10px;background:#00a884;border:none;color:white}

#app{display:none;height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:35%;background:#111b21;overflow:auto}
.user{padding:12px;display:flex;gap:12px;cursor:pointer}
.user:hover{background:#202c33}

.avatar{width:45px;height:45px;border-radius:50%;
background:linear-gradient(135deg,#6a5acd,#8a2be2);
display:flex;align-items:center;justify-content:center;font-weight:bold}

.status{font-size:12px;color:#8696a0}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column}
#chatHeader{
display:flex;justify-content:space-between;
padding:10px;background:#202c33
}

#menuBtn{cursor:pointer}

#menu{
position:absolute;right:10px;top:50px;
background:#202c33;border-radius:8px;
display:none
}
#menu div{padding:10px;cursor:pointer}
#menu div:hover{background:#333}

#messages{
flex:1;
padding:15px 15px 80px;
overflow:auto
}

.msg{margin:5px 0;padding:8px;border-radius:10px;max-width:60%}
.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

.tick{font-size:12px;margin-left:5px}

#typing{font-size:12px;color:#8696a0;padding:5px}

#input{
position:sticky;
bottom:0;
display:flex;
padding:10px;
background:#202c33
}
#input input{flex:1;padding:10px;border:none}
#input button{padding:10px;background:#00a884;border:none;color:white}
</style>
</head>

<body>

<div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<div id="app">

<div id="sidebar"></div>

<div id="chat">
  <div id="chatHeader">
    <div>
      <div id="chatName">Select User</div>
      <div id="chatStatus" class="status"></div>
    </div>
    <div id="menuBtn">⋮</div>
  </div>

  <div id="menu">
    <div onclick="toggleBlock()">Block</div>
    <div onclick="clearChat()">Clear Chat</div>
  </div>

  <div id="messages"></div>
  <div id="typing"></div>

  <div id="input">
    <input id="msg" placeholder="Message" oninput="typing()">
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let CURRENT_USER=null;
let currentChat=null;
let unsub=null;

// LOGIN
async function login(){
  let u=uEl.value.trim().toLowerCase();
  let p=pEl.value;

  let email=u+"@app.com";

  try{
    await auth.signInWithEmailAndPassword(email,p);
  }catch{
    let cred=await auth.createUserWithEmailAndPassword(email,p);

    await db.collection("users").doc(cred.user.uid).set({
      uid:cred.user.uid,
      name:u,
      lastSeen:Date.now(),
      online:true,
      blocked:[]
    });
  }
}

const uEl=document.getElementById("u");
const pEl=document.getElementById("p");

// AUTH
auth.onAuthStateChanged(user=>{
  if(user){
    ME=user;
    login.style.display="none";
    app.style.display="flex";

    db.collection("users").doc(user.uid).update({
      online:true
    });

    loadUsers();
  }
});

// USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    sidebar.innerHTML="";
    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;

      let div=document.createElement("div");
      div.className="user";

      div.innerHTML=`
        <div class="avatar">${u.name[0]}</div>
        <div>
          <div>${u.name}</div>
          <div class="status">${u.online?"Online":lastSeen(u.lastSeen)}</div>
        </div>
      `;

      div.onclick=()=>openChat(u);
      sidebar.appendChild(div);
    });
  });
}

// LAST SEEN
function lastSeen(t){
  if(!t) return "";
  let min=Math.floor((Date.now()-t)/60000);
  return "Last seen "+min+" min ago";
}

// OPEN CHAT
function openChat(u){
  CURRENT_USER=u;
  chatName.innerText=u.name;

  currentChat=[ME.uid,u.uid].sort().join("_");

  if(unsub) unsub();

  unsub=db.collection("chats")
  .doc(currentChat)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    messages.innerHTML="";
    snap.forEach(d=>{
      let m=d.data();
      let div=document.createElement("div");

      let tick = m.seen ? "✔✔" : "✔";

      div.className="msg "+(m.uid===ME.uid?"me":"other");
      div.innerHTML=m.text + (m.uid===ME.uid?` <span class="tick">${tick}</span>`:"");

      // mark seen
      if(m.uid!==ME.uid && !m.seen){
        d.ref.update({seen:true});
      }

      messages.appendChild(div);
    });

    messages.scrollTop=messages.scrollHeight;
  });

  // typing listener
  db.collection("typing").doc(currentChat).onSnapshot(doc=>{
    if(doc.exists){
      let t=doc.data();
      typingDiv.innerText = t.uid===ME.uid?"":`${u.name} typing...`;
    }
  });
}

// SEND
async function send(){
  let text=msg.value.trim();
  if(!text) return;

  await db.collection("chats").doc(currentChat)
  .collection("messages").add({
    text:text,
    uid:ME.uid,
    seen:false,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });

  msg.value="";
}

// TYPING
function typing(){
  db.collection("typing").doc(currentChat).set({
    uid:ME.uid
  });
}

// BLOCK
async function toggleBlock(){
  let ref=db.collection("users").doc(ME.uid);
  let doc=await ref.get();
  let arr=doc.data().blocked || [];

  if(arr.includes(CURRENT_USER.uid)){
    arr=arr.filter(id=>id!==CURRENT_USER.uid);
    alert("Unblocked");
  }else{
    arr.push(CURRENT_USER.uid);
    alert("Blocked");
  }

  await ref.update({blocked:arr});
}

// CLEAR CHAT
async function clearChat(){
  let snap=await db.collection("chats")
  .doc(currentChat)
  .collection("messages").get();

  snap.forEach(d=>d.ref.delete());
}

// MENU
menuBtn.onclick=()=>{
  menu.style.display = menu.style.display==="block"?"none":"block";
};

const typingDiv=document.getElementById("typing");
</script>

</body>
      </html>
