<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;height:100vh}

/* LOGIN */
#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#loginBox{background:#fff;padding:25px;border-radius:10px;width:300px}
#login input{width:100%;padding:10px;margin:10px 0}
#login button{width:100%;padding:10px;background:#667eea;color:#fff;border:none;cursor:pointer}

/* APP */
#app{display:none;height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:30%;background:#f0f2f5;overflow:auto}
.user{padding:15px;border-bottom:1px solid #ddd;cursor:pointer}
.user:hover{background:#ddd}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column}
#messages{flex:1;padding:10px;overflow:auto}
.msg{margin:5px 0;padding:8px;border-radius:10px;max-width:60%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

#input{display:flex;padding:10px;border-top:1px solid #ccc}
#input input{flex:1;padding:10px}
#input button{padding:10px;cursor:pointer}
</style></head><body><!-- LOGIN --><div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username (min 3)">
    <input id="p" type="password" placeholder="Password (min 6)">
    <button onclick="login()">Login / Signup</button>
  </div>
</div><!-- APP --><div id="app">
  <div id="sidebar"></div>  <div id="chat">
    <div id="messages"></div>
    <div id="input">
      <input id="msg" placeholder="Type message">
      <button onclick="send()">Send</button>
    </div>
  </div>
</div><script>
// 🔥 Firebase Config (same as your project)
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let currentChat=null;
let unsub=null;

// 🔐 LOGIN / SIGNUP FINAL
async function login(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(u.length<3 || p.length<6){
    alert("Invalid input");
    return;
  }

  if(u.includes(" ")){
    alert("No spaces allowed");
    return;
  }

  let email=u+"@app.com";

  try{
    // 🔍 CHECK USER EXISTS IN FIRESTORE
    let snap = await db.collection("users")
      .where("name","==",u)
      .get();

    if(snap.empty){
      // 🆕 CREATE USER
      let cred = await auth.createUserWithEmailAndPassword(email,p);

      await db.collection("users").doc(cred.user.uid).set({
        name:u,
        uid:cred.user.uid
      });

      alert("Account created ✅");

    }else{
      // 🔑 LOGIN USER
      await auth.signInWithEmailAndPassword(email,p);
    }

  }catch(e){
    console.log(e.code);

    if(e.code==="auth/wrong-password"){
      alert("Wrong password ❌");
    }else{
      alert(e.message);
    }
  }
}

// 🔄 AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user){
    ME=user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    loadUsers();
  }
});

// 👥 LOAD USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let box=document.getElementById("sidebar");
    box.innerHTML="";

    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;

      let div=document.createElement("div");
      div.className="user";
      div.innerText=u.name;

      div.onclick=()=>openChat(u.uid);
      box.appendChild(div);
    });
  });
}

// 💬 OPEN CHAT
function openChat(uid){
  currentChat=[ME.uid,uid].sort().join("_");

  if(unsub) unsub();

  unsub=db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{
      let box=document.getElementById("messages");
      box.innerHTML="";

      snap.forEach(d=>{
        let m=d.data();
        let div=document.createElement("div");
        div.className="msg "+(m.uid===ME.uid?"me":"other");
        div.innerText=m.text;
        box.appendChild(div);
      });

      box.scrollTop=box.scrollHeight;
    });
}

// 📩 SEND MESSAGE
async function send(){
  let input=document.getElementById("msg");
  let text=input.value.trim();

  if(!text || !currentChat) return;

  await db.collection("chats").doc(currentChat).set({
    users: currentChat.split("_")
  },{merge:true});

  await db.collection("chats")
    .doc(currentChat)
    .collection("messages")
    .add({
      text:text,
      uid:ME.uid,
      time: firebase.firestore.FieldValue.serverTimestamp()
    });

  input.value="";
}
</script></body>
</html>
