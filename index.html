<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkApp Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#f0f2f5}
.screen{display:none;height:100vh;flex-direction:column}
.active{display:flex}

/* LOGIN */
#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#box{background:#fff;padding:25px;border-radius:12px;width:280px;text-align:center}

/* HEADER */
.header{background:#075E54;color:#fff;padding:15px;font-size:18px}
.user{padding:12px;border-bottom:1px solid #ddd;cursor:pointer}

/* CHAT */
#messages{flex:1;overflow:auto;padding:10px;background:#ece5dd}
.msg{padding:10px;border-radius:10px;margin:5px;max-width:65%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}

.tick{font-size:11px;margin-left:5px}
.seen{color:blue}

#input{display:flex;padding:10px;background:#fff}
#input input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="box">
    <h2>TalkApp</h2>
    <button onclick="googleLogin()" style="padding:12px;width:100%;cursor:pointer">
      Continue with Google
    </button>
  </div>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
  <div class="header">
    TalkApp
    <span style="float:right;cursor:pointer" onclick="logout()">🚪</span>
    <span style="float:right;margin-right:15px;cursor:pointer" onclick="openSearch()">🔍</span>
  </div>
  <div id="chatList"></div>
</div>

<!-- SEARCH -->
<div id="searchScreen" class="screen">
  <div class="header">
    Search
    <span style="float:left;cursor:pointer" onclick="back()">⬅</span>
  </div>
  <input id="searchInput" placeholder="Search user..." onkeyup="searchUser()">
  <div id="userList"></div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div class="header">
    <span onclick="back()">⬅</span>
    <span id="chatName"></span>
    <button onclick="toggleBlock()">Block</button>
  </div>

  <div id="status"></div>
  <div id="typing"></div>
  <div id="messages"></div>

  <div id="input">
    <input id="msg" placeholder="Type..." oninput="typingNow()">
    <button onclick="send()">Send</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, orderBy, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCz0Bwl9Vz79DNOnFN4t9TaEKtKKUL5m8o",
  authDomain: "talkapp-70bee.firebaseapp.com",
  projectId: "talkapp-70bee"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let ME,currentUser,currentChat,unsub=null;

// GOOGLE LOGIN
window.googleLogin = async()=>{
  try{
    let res = await signInWithPopup(auth,new GoogleAuthProvider());
    let user = res.user;

    let ref = doc(db,"users",user.uid);
    let snap = await getDoc(ref);

    if(!snap.exists()){
      await setDoc(ref,{
        name:user.displayName.toLowerCase().replace(/\s/g,''),
        uid:user.uid,
        blocked:[],
        lastSeen:Date.now()
      });
    }

  }catch(e){
    alert(e.message);
  }
};

// AUTH
onAuthStateChanged(auth, async user=>{
  if(user){
    ME=user;
    document.getElementById("login").style.display="none";
    show("homeScreen");
    loadChatList();

    setInterval(()=>{
      updateDoc(doc(db,"users",ME.uid),{lastSeen:Date.now()});
    },5000);
  }else{
    document.getElementById("login").style.display="flex";
  }
});

// LOGOUT
window.logout = async()=>{
  await signOut(auth);
  if(unsub)unsub();
};

// SCREEN SWITCH
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// SEARCH
window.openSearch=()=>show("searchScreen");

window.searchUser=()=>{
  let term=searchInput.value.toLowerCase();
  if(!term)return userList.innerHTML="";

  onSnapshot(collection(db,"users"),snap=>{
    userList.innerHTML="";
    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid)return;
      if(u.name.includes(term)){
        let div=document.createElement("div");
        div.className="user";
        div.innerText=u.name;
        div.onclick=()=>openChat(u);
        userList.appendChild(div);
      }
    });
  });
};

// CHAT LIST
function loadChatList(){
  onSnapshot(collection(db,"chats"),async snap=>{
    chatList.innerHTML="";

    for(let d of snap.docs){
      let id=d.id;
      if(!id.includes(ME.uid)) continue;

      let other=id.replace(ME.uid,"").replace("_","");
      let udoc=await getDoc(doc(db,"users",other));
      if(!udoc.exists()) continue;

      let u=udoc.data();

      let msgs=await getDocs(query(collection(db,"chats",id,"messages"),orderBy("time","desc")));
      let last="";
      msgs.forEach(m=>{
        if(!last){
          let data=m.data();
          last=data.deleted?"deleted":data.text;
        }
      });

      let div=document.createElement("div");
      div.className="user";
      div.innerHTML=`<b>${u.name}</b><br><small>${last}</small>`;
      div.onclick=()=>openChat(u);
      chatList.appendChild(div);
    }
  });
}

// OPEN CHAT
function openChat(u){
  currentUser=u;
  currentChat=[ME.uid,u.uid].sort().join("_");
  chatName.innerText=u.name;
  show("chatScreen");

  onSnapshot(doc(db,"users",u.uid),d=>{
    let diff=(Date.now()-d.data().lastSeen)/1000;
    status.innerText=diff<5?"online":"last seen "+Math.floor(diff)+"s";
  });

  onSnapshot(doc(db,"typing",currentChat),d=>{
    typing.innerText=(d.exists() && d.data().uid!==ME.uid)?"typing...":"";
  });

  if(unsub)unsub();

  unsub=onSnapshot(query(collection(db,"chats",currentChat,"messages"),orderBy("time")),snap=>{
    messages.innerHTML="";
    snap.forEach(docu=>{
      let m=docu.data();

      let div=document.createElement("div");
      div.className="msg "+(m.uid===ME.uid?"me":"other");

      div.innerHTML=(m.deleted?"<i>deleted</i>":m.text)
      +" "+(m.uid===ME.uid?(m.seen?"✔✔":"✔"):"");

      if(m.uid!==ME.uid && !m.seen){
        updateDoc(doc(db,"chats",currentChat,"messages",docu.id),{seen:true});
      }

      div.oncontextmenu=e=>{
        e.preventDefault();
        if(m.uid===ME.uid){
          updateDoc(doc(db,"chats",currentChat,"messages",docu.id),{deleted:true});
        }
      };

      messages.appendChild(div);
    });

    messages.scrollTop=messages.scrollHeight;
  });
}

// SEND
window.send=async()=>{
  if(!msg.value)return;

  await addDoc(collection(db,"chats",currentChat,"messages"),{
    text:msg.value,
    uid:ME.uid,
    seen:false,
    deleted:false,
    time:Date.now()
  });

  msg.value="";
};

// typing
window.typingNow=()=>{
  if(!currentChat)return;
  setDoc(doc(db,"typing",currentChat),{uid:ME.uid});
  setTimeout(()=>setDoc(doc(db,"typing",currentChat),{}),1000);
};

// block
window.toggleBlock=async()=>{
  let ref=doc(db,"users",ME.uid);
  let d=await getDoc(ref);
  let arr=d.data().blocked||[];

  if(arr.includes(currentUser.uid)){
    arr=arr.filter(x=>x!==currentUser.uid);
  }else{
    arr.push(currentUser.uid);
  }

  await updateDoc(ref,{blocked:arr});
  alert("Updated");
};

window.back=()=>show("homeScreen");

</script>
</body>
  </html>
