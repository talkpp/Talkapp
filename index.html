<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone Level 2</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:white}

/* LOGIN */
#login{display:flex;justify-content:center;align-items:center;height:100vh}
#loginBox{background:#202c33;padding:20px;border-radius:10px;width:300px}
#login input{width:100%;padding:10px;margin:8px 0;background:#111;border:none;color:white}
#login button{width:100%;padding:10px;background:#00a884;border:none;color:white}

/* APP */
#app{display:none;height:100vh;display:flex}

/* SIDEBAR */
#sidebar{width:35%;background:#111b21;overflow:auto}
.user{padding:12px;display:flex;justify-content:space-between;cursor:pointer}
.user:hover{background:#202c33}
.userName{font-weight:bold}
.userLast{font-size:12px;color:#aaa}

/* CHAT */
#chat{flex:1;display:flex;flex-direction:column}
#header{padding:10px;background:#202c33}
#status{font-size:12px;color:#aaa}

#messages{flex:1;padding:10px;overflow:auto}
.msg{margin:5px 0;padding:8px;border-radius:10px;max-width:60%}
.me{background:#005c4b;margin-left:auto}
.other{background:#202c33}

.tick{font-size:11px;margin-left:5px}
.seen{color:#53bdeb}

#typing{font-size:12px;color:#aaa;padding-left:10px}

#input{display:flex;padding:10px;background:#202c33}
#input input{flex:1;padding:10px}
#input button{padding:10px;background:#00a884;border:none;color:white}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div id="loginBox">
    <h2>TalkZone</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div id="sidebar"></div>

<div id="chat">
  <div id="header">
    <div id="chatName">Select User</div>
    <div id="status"></div>
  </div>

  <div id="messages"></div>
  <div id="typing"></div>

  <div id="input">
    <input id="msg" placeholder="Type message..." oninput="typingUpdate()">
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let currentUser=null;
let currentChat=null;
let unsub=null;
let typingTimeout=null;

// LOGIN
async function login(){
  let u=uEl.value.trim().toLowerCase();
  let p=pEl.value;
  let email=u+"@app.com";

  try{
    await auth.signInWithEmailAndPassword(email,p);
  }catch{
    let cred=await auth.createUserWithEmailAndPassword(email,p);

    await db.collection("users").doc(cred.user.uid).set({
      uid:cred.user.uid,
      name:u,
      lastSeen:Date.now(),
      typing:false,
      blocked:[]
    });
  }
}

const uEl=document.getElementById("u");
const pEl=document.getElementById("p");

// AUTH
auth.onAuthStateChanged(async user=>{
  if(user){
    ME=user;
    login.style.display="none";
    app.style.display="flex";

    db.collection("users").doc(ME.uid).update({
      lastSeen:Date.now()
    });

    loadUsers();
  }
});

// USERS LIST
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    sidebar.innerHTML="";
    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;

      let div=document.createElement("div");
      div.className="user";

      div.innerHTML=`
      <div>
        <div class="userName">${u.name}</div>
        <div class="userLast">${u.lastMsg||''}</div>
      </div>
      <div class="userLast">${formatTime(u.lastTime)}</div>
      `;

      div.onclick=()=>openChat(u);
      sidebar.appendChild(div);
    });
  });
}

// CHAT
function openChat(u){
  currentUser=u;
  chatName.innerText=u.name;
  currentChat=[ME.uid,u.uid].sort().join("_");

  if(unsub) unsub();

  unsub=db.collection("chats").doc(currentChat)
  .collection("messages")
  .orderBy("time")
  .onSnapshot(snap=>{
    messages.innerHTML="";

    snap.forEach(d=>{
      let m=d.data();
      let div=document.createElement("div");
      div.className="msg "+(m.uid===ME.uid?"me":"other");

      let tick = m.seen ? "✔✔":"✔";

      div.innerHTML = m.deleted ? "<i>Deleted</i>" :
        m.text + (m.uid===ME.uid?` <span class="tick ${m.seen?'seen':''}">${tick}</span>`:"");

      // seen update
      if(m.uid!==ME.uid && !m.seen){
        d.ref.update({seen:true});
      }

      messages.appendChild(div);
    });

    messages.scrollTop=messages.scrollHeight;
  });

  // typing + last seen
  db.collection("users").doc(u.uid)
  .onSnapshot(doc=>{
    let data=doc.data();
    if(data.typing){
      status.innerText="typing...";
    }else{
      status.innerText="Last seen: "+formatTime(data.lastSeen);
    }
  });
}

// SEND
async function send(){
  let text=msg.value.trim();
  if(!text) return;

  await db.collection("chats").doc(currentChat).collection("messages").add({
    text:text,
    uid:ME.uid,
    seen:false,
    deleted:false,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });

  // update sidebar preview
  await db.collection("users").doc(currentUser.uid).update({
    lastMsg:text,
    lastTime:Date.now()
  });

  msg.value="";
}

// TYPING
function typingUpdate(){
  if(!currentUser) return;

  db.collection("users").doc(ME.uid).update({typing:true});

  clearTimeout(typingTimeout);
  typingTimeout=setTimeout(()=>{
    db.collection("users").doc(ME.uid).update({typing:false});
  },1500);
}

// TIME FORMAT
function formatTime(ts){
  if(!ts) return "";
  let d=new Date(ts);
  return d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
}
</script>

</body>
</html>
