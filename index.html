<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkZone</title>

<!-- ✅ Firebase CDN (stable version) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;height:100vh}
#login{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea}
#box{background:#fff;padding:20px;border-radius:10px;width:300px}
input{width:100%;padding:10px;margin:8px 0}
button{width:100%;padding:10px;background:#667eea;color:#fff;border:none}
#app{display:none;height:100vh;display:flex}
#users{width:30%;background:#eee;overflow:auto}
.user{padding:10px;border-bottom:1px solid #ccc;cursor:pointer}
#chat{flex:1;display:flex;flex-direction:column}
#msgs{flex:1;padding:10px;overflow:auto}
.msg{margin:5px;padding:8px;border-radius:8px;max-width:60%}
.me{background:#dcf8c6;margin-left:auto}
.other{background:#fff}
#send{display:flex}
#send input{flex:1}
</style>
</head>

<body>

<div id="login">
  <div id="box">
    <h3>TalkZone</h3>
    <input id="u" placeholder="username">
    <input id="p" type="password" placeholder="password">
    <button onclick="login()">Login / Signup</button>
  </div>
</div>

<div id="app">
  <div id="users"></div>
  <div id="chat">
    <div id="msgs"></div>
    <div id="send">
      <input id="m" placeholder="message">
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
// ✅ YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAKLZ4dHYp0ZFLolMB5XPxDUu-QPXB_MqA",
  authDomain: "talkzone-b3488.firebaseapp.com",
  projectId: "talkzone-b3488"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let ME=null;
let chatId=null;
let unsub=null;

// 🔐 LOGIN / SIGNUP FIXED
async function login(){
  let u=document.getElementById("u").value.trim().toLowerCase();
  let p=document.getElementById("p").value;

  if(!u || p.length<6){
    alert("Invalid input");
    return;
  }

  let email=u+"@app.com";

  try{
    await auth.signInWithEmailAndPassword(email,p);
  }catch(e){

    if(e.code==="auth/user-not-found"){
      let cred=await auth.createUserWithEmailAndPassword(email,p);

      // ✅ UID BASED SAVE
      await db.collection("users").doc(cred.user.uid).set({
        name:u,
        uid:cred.user.uid
      });

    }else{
      alert("Wrong password");
    }
  }
}

// 🔁 AUTH STATE
auth.onAuthStateChanged(user=>{
  if(user){
    ME=user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
    loadUsers();
  }
});

// 👥 LOAD USERS
function loadUsers(){
  db.collection("users").onSnapshot(snap=>{
    let box=document.getElementById("users");
    box.innerHTML="";

    snap.forEach(d=>{
      let u=d.data();
      if(u.uid===ME.uid) return;

      let div=document.createElement("div");
      div.className="user";
      div.innerText=u.name;
      div.onclick=()=>openChat(u.uid);

      box.appendChild(div);
    });
  });
}

// 💬 OPEN CHAT
function openChat(uid){
  chatId=[ME.uid,uid].sort().join("_");

  if(unsub) unsub();

  unsub=db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snap=>{
      let box=document.getElementById("msgs");
      box.innerHTML="";

      snap.forEach(d=>{
        let m=d.data();
        let div=document.createElement("div");
        div.className="msg "+(m.uid===ME.uid?"me":"other");
        div.innerText=m.text;
        box.appendChild(div);
      });

      box.scrollTop=box.scrollHeight;
    });
}

// 📤 SEND
async function send(){
  let input=document.getElementById("m");
  let text=input.value.trim();
  if(!text || !chatId) return;

  await db.collection("chats").doc(chatId).set({
    users: chatId.split("_")
  },{merge:true});

  await db.collection("chats")
    .doc(chatId)
    .collection("messages")
    .add({
      text:text,
      uid:ME.uid,
      time: firebase.firestore.FieldValue.serverTimestamp()
    });

  input.value="";
}
</script>

</body>
</html>
